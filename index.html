<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Hide scrollbar for clean UI */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        /* Safe padding for mobile devices */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        /* Kanban card grab cursor */
        .kanban-card { cursor: grab; }
        .kanban-card:active { cursor: grabbing; }
    </style>
</head>
<body class="bg-slate-50 font-sans overflow-hidden text-gray-800">
    
    <!-- Main App Wrapper -->
    <div id="app" class="flex flex-col lg:flex-row h-screen w-full relative"></div>
    
    <!-- Footer Watermark -->
    <div class="fixed bottom-2 right-4 text-[10px] text-gray-400 z-50 pointer-events-none tracking-widest font-medium">
        created by netalen priscyla
    </div>

    <!-- Modals Wrapper -->
    <div id="modal-root"></div>

    <script>
        // ==========================================
        // 1. CONSTANTS & CONFIGURATION
        // ==========================================
        const TODAY = '2026-06-11'; // Current system date
        const TAILWIND_COLORS = [
            'bg-red-500', 'bg-orange-500', 'bg-amber-500', 
            'bg-green-500', 'bg-teal-500', 'bg-blue-500', 
            'bg-indigo-500', 'bg-purple-500', 'bg-pink-500'
        ];
        
        const MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const DAYS_NAMES = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

        // Expanded themes based on color palette
        const THEMES = [
            { id: 'teal', name: 'Teal', mainBg: 'bg-[#285c54]', mainText: 'text-[#285c54]', mainBorder: 'border-[#285c54]', hoverBg: 'hover:bg-[#1e4740]', lightBg: 'bg-[#eef7f5]', accentText: 'text-[#a7d3cb]' },
            { id: 'blue', name: 'Pacific Blue', mainBg: 'bg-[#0096c7]', mainText: 'text-[#0096c7]', mainBorder: 'border-[#0096c7]', hoverBg: 'hover:bg-[#0077b6]', lightBg: 'bg-[#e0f2fe]', accentText: 'text-[#bae6fd]' },
            { id: 'navy', name: 'Navy', mainBg: 'bg-[#1e3a8a]', mainText: 'text-[#1e3a8a]', mainBorder: 'border-[#1e3a8a]', hoverBg: 'hover:bg-[#172554]', lightBg: 'bg-[#eff6ff]', accentText: 'text-[#bfdbfe]' },
            { id: 'rose', name: 'Rose', mainBg: 'bg-[#be123c]', mainText: 'text-[#be123c]', mainBorder: 'border-[#be123c]', hoverBg: 'hover:bg-[#9f1239]', lightBg: 'bg-[#fff1f2]', accentText: 'text-[#fecdd3]' },
            { id: 'lilac', name: 'Lilac', mainBg: 'bg-[#7e22ce]', mainText: 'text-[#7e22ce]', mainBorder: 'border-[#7e22ce]', hoverBg: 'hover:bg-[#6b21a8]', lightBg: 'bg-[#faf5ff]', accentText: 'text-[#e9d5ff]' },
            { id: 'mint', name: 'Mint Green', mainBg: 'bg-[#059669]', mainText: 'text-[#059669]', mainBorder: 'border-[#059669]', hoverBg: 'hover:bg-[#047857]', lightBg: 'bg-[#ecfdf5]', accentText: 'text-[#a7f3d0]' },
            { id: 'peach', name: 'Peach', mainBg: 'bg-[#ea580c]', mainText: 'text-[#ea580c]', mainBorder: 'border-[#ea580c]', hoverBg: 'hover:bg-[#c2410c]', lightBg: 'bg-[#fff7ed]', accentText: 'text-[#fed7aa]' },
            { id: 'night', name: 'Night', mainBg: 'bg-[#171717]', mainText: 'text-[#171717]', mainBorder: 'border-[#171717]', hoverBg: 'hover:bg-[#262626]', lightBg: 'bg-[#f5f5f5]', accentText: 'text-[#d4d4d4]' }
        ];

        const TABS = [
            { id: 'Dashboard', name: 'Dashboard', icon: 'home' },
            { id: 'My Tasks', name: 'My Tasks', icon: 'calendar' },
            { id: 'Projects', name: 'Projects', icon: 'briefcase' },
            { id: 'Settings', name: 'Settings', icon: 'settings' }
        ];

        const PRIORITY_SCORES = { 'High': 3, 'Medium': 2, 'Low': 1 };
        const PRIORITY_COLORS = { 
            'High': 'bg-red-100 text-red-700 border-red-200', 
            'Medium': 'bg-orange-100 text-orange-700 border-orange-200', 
            'Low': 'bg-blue-100 text-blue-700 border-blue-200' 
        };

        let monthOptions = [];
        for(let y = 2026; y <= 2030; y++) {
            let startM = (y === 2026) ? 5 : 0; 
            for(let m = startM; m < 12; m++) monthOptions.push({ label: `${MONTH_NAMES[m]} ${y}`, m, y });
        }

        function formatFullDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            return `${DAYS_NAMES[d.getDay()]}, ${d.getDate().toString().padStart(2, '0')} ${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`;
        }

        // ==========================================
        // 2. STATE MANAGEMENT & LOCAL STORAGE
        // ==========================================
        window.state = {
            activeTab: 'Dashboard',
            userName: 'Tata',
            theme: THEMES[0],
            searchQuery: '',
            
            categories: [
                { name: 'Audit', color: 'bg-purple-500' },
                { name: 'Content', color: 'bg-orange-500' }
            ],
            tasks: [
                { id: 1, title: 'Review Marketing Copy', category: 'Content', status: 'Done', priority: 'Medium', date: TODAY, time: '10:00', isAllDay: false, details: 'Review all copy for the Q3 campaign.' },
                { id: 2, title: 'Finalize Budget Report', category: 'Audit', status: 'To Do', priority: 'High', date: '2026-06-15', time: '', isAllDay: true, details: 'Need to submit before Friday.' }
            ],
            projects: [
                {
                    id: 1, title: 'United Tractors', startDate: '2026-06-06', endDate: '2026-08-06', category: 'Audit', progress: 33,
                    actions: [
                        { id: 101, text: 'Compile asset inventory', date: '2026-06-09', priority: 'Low', status: 'Done', details: 'Check all internal assets.' },
                        { id: 102, text: 'Review visual identity', date: TODAY, priority: 'High', status: 'In Progress', details: 'Meet with design team to review current visual guidelines.' },
                        { id: 103, text: 'Draft presentation', date: '2026-06-15', priority: 'Medium', status: 'To Do', details: 'Prepare slides for final audit.' }
                    ]
                }
            ],
            
            calMonth: 5, calYear: 2026, selectedDate: TODAY,
            
            // Unified Task Modal
            isTaskModalOpen: false,
            taskModalData: null,
            
            // Project Settings Modal
            isProjectModalOpen: false,
            projectForm: null,
            
            newCategoryInput: '', newCategoryColor: TAILWIND_COLORS[0],
        };

        function loadFromStorage() {
            try {
                const saved = localStorage.getItem('taskTrackerData');
                if (saved) {
                    const data = JSON.parse(saved);
                    window.state.userName = data.userName || window.state.userName;
                    window.state.theme = data.theme || window.state.theme;
                    window.state.categories = data.categories || window.state.categories;
                    
                    window.state.tasks = (data.tasks || []).map(t => ({
                        ...t,
                        priority: t.priority || 'Medium',
                        status: t.status || (t.done ? 'Done' : 'To Do'),
                    }));
                    window.state.projects = (data.projects || []).map(p => ({
                        ...p,
                        actions: (p.actions || []).map(a => ({
                            ...a,
                            priority: a.priority || 'Medium',
                            status: a.status || (a.isCompleted ? 'Done' : 'To Do'),
                        }))
                    }));
                }
            } catch (e) { console.error("Error loading data:", e); }
        }

        window.saveToStorage = function() {
            const dataToSave = {
                userName: window.state.userName,
                theme: window.state.theme,
                categories: window.state.categories,
                tasks: window.state.tasks,
                projects: window.state.projects
            };
            localStorage.setItem('taskTrackerData', JSON.stringify(dataToSave));
        };

        // ==========================================
        // 3. CORE RENDERING ENGINE
        // ==========================================
        function renderApp() {
            document.getElementById('app').innerHTML = `
                ${renderMobileHeader()}
                ${renderDesktopSidebar()}
                ${renderMainContent()}
                ${renderMobileNav()}
            `;
            lucide.createIcons();
        }

        function refreshTab() {
            const content = document.getElementById('tab-content');
            if (content) {
                if (window.state.activeTab === 'Dashboard') content.innerHTML = viewDashboard();
                else if (window.state.activeTab === 'My Tasks') content.innerHTML = viewMyTasks();
                else if (window.state.activeTab === 'Projects') content.innerHTML = viewProjects();
                else if (window.state.activeTab === 'Settings') content.innerHTML = viewSettings();
                lucide.createIcons();
            }
        }

        function renderModals() {
            const modalRoot = document.getElementById('modal-root');
            let html = '';
            if (window.state.isTaskModalOpen) html += renderUnifiedTaskModal();
            if (window.state.isProjectModalOpen) html += renderProjectSettingsModal();
            modalRoot.innerHTML = html;
            lucide.createIcons();
        }

        // ==========================================
        // 4. LAYOUT COMPONENTS
        // ==========================================
        function renderMobileHeader() {
            return `
            <header class="lg:hidden ${window.state.theme.mainBg} text-white p-4 rounded-b-3xl flex justify-between items-center z-20 shadow-md flex-shrink-0">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full border-2 border-white/20 bg-black/20 flex items-center justify-center">
                        <span class="font-bold text-lg uppercase">${window.state.userName.charAt(0)}</span>
                    </div>
                    <div>
                        <h1 class="font-bold text-lg leading-tight tracking-wide flex items-center gap-1">
                            <i data-lucide="check-square" class="w-4 h-4 opacity-80"></i> Tracker
                        </h1>
                        <p class="text-[10px] ${window.state.theme.accentText}">Hello, ${window.state.userName}</p>
                    </div>
                </div>
            </header>`;
        }

        function renderDesktopSidebar() {
            const navItems = TABS.map(t => `
                <button onclick="window.setActiveTab('${t.id}')" class="w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all duration-200 ${window.state.activeTab === t.id ? 'bg-white/10 font-medium shadow-sm' : 'text-white/70 hover:bg-white/5 hover:text-white'}">
                    <i data-lucide="${t.icon}" class="w-5 h-5"></i> ${t.name}
                </button>
            `).join('');

            return `
            <aside class="hidden lg:flex w-64 ${window.state.theme.mainBg} text-white flex-shrink-0 flex-col rounded-r-3xl z-10 h-full transition-colors duration-300">
                <div class="p-8 pb-4">
                    <div class="flex items-center gap-2 mb-10 font-bold text-xl tracking-wide">
                        <i data-lucide="check-square" class="w-6 h-6 ${window.state.theme.accentText}"></i> Tracker
                    </div>
                    <div class="flex flex-col items-center mb-6">
                        <div class="w-20 h-20 rounded-full border-4 border-white/20 bg-black/20 flex items-center justify-center mb-4 shadow-lg">
                            <span class="text-3xl font-bold uppercase">${window.state.userName.charAt(0)}</span>
                        </div>
                        <h2 class="font-semibold text-lg">${window.state.userName}</h2>
                    </div>
                </div>
                <nav class="flex-1 px-4 space-y-2">${navItems}</nav>
            </aside>`;
        }

        function renderMobileNav() {
            const navItems = TABS.map(t => `
                <button onclick="window.setActiveTab('${t.id}')" class="flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors ${window.state.activeTab === t.id ? window.state.theme.mainText : 'text-gray-400'}">
                    <i data-lucide="${t.icon}" class="w-5 h-5 ${window.state.activeTab === t.id ? 'fill-current opacity-20' : ''}"></i>
                    <span class="text-[9px] font-bold">${t.name}</span>
                </button>
            `).join('');

            return `<div class="lg:hidden fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 z-40 flex justify-around items-center h-16 pb-safe shadow-lg">${navItems}</div>`;
        }

        function renderMainContent() {
            const title = window.state.activeTab === 'Dashboard' ? `Hello, ${window.state.userName}` : TABS.find(t=>t.id === window.state.activeTab).name;
            
            return `
            <main class="flex-1 p-4 lg:p-10 pb-28 lg:pb-10 overflow-y-auto scrollbar-hide flex flex-col relative">
                <!-- Desktop Header -->
                <header class="hidden lg:flex flex-col md:flex-row md:items-center justify-between mb-10 gap-4 flex-shrink-0">
                    <div>
                        <h1 class="text-3xl font-bold tracking-tight">${title}</h1>
                        <p class="text-gray-500 mt-1">Today is ${formatFullDate(TODAY)}</p>
                    </div>
                    <div class="flex items-center gap-4 w-full md:w-auto">
                        <div class="relative w-full md:w-64">
                            <i data-lucide="search" class="w-5 h-5 absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="text" oninput="window.handleSearch(this.value)" value="${window.state.searchQuery}" placeholder="Search tasks..." class="pl-10 pr-4 py-2.5 bg-white rounded-full text-sm border-none shadow-sm focus:outline-none focus:ring-2 focus:ring-gray-200 w-full" />
                        </div>
                    </div>
                </header>

                <!-- Mobile Header -->
                <div class="lg:hidden mb-4 space-y-4">
                    <div class="relative">
                        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="text" oninput="window.handleSearch(this.value)" value="${window.state.searchQuery}" placeholder="Search tasks..." class="pl-9 pr-4 py-2 bg-white rounded-full text-xs border border-gray-100 shadow-sm focus:outline-none w-full" />
                    </div>
                    <div class="flex justify-between items-end">
                        <h1 class="text-xl font-bold tracking-tight">${window.state.activeTab === 'Dashboard' ? 'Overview' : title}</h1>
                        <p class="text-[10px] font-medium text-gray-500">${formatFullDate(TODAY)}</p>
                    </div>
                </div>

                <!-- Tab Content Router -->
                <div class="flex-1 max-w-6xl w-full mx-auto" id="tab-content">
                    ${window.state.activeTab === 'Dashboard' ? viewDashboard() : ''}
                    ${window.state.activeTab === 'My Tasks' ? viewMyTasks() : ''}
                    ${window.state.activeTab === 'Projects' ? viewProjects() : ''}
                    ${window.state.activeTab === 'Settings' ? viewSettings() : ''}
                </div>

                <!-- Global Add Task Button -->
                <button onclick="window.openCreateTaskModal()" class="fixed bottom-20 right-4 lg:bottom-10 lg:right-10 w-14 h-14 lg:w-16 lg:h-16 bg-gray-900 text-white rounded-full flex items-center justify-center shadow-xl ${window.state.theme.hoverBg} hover:scale-105 transition-all z-30 group" title="Add New Task">
                    <i data-lucide="plus" class="w-6 h-6 lg:w-8 lg:h-8 group-hover:rotate-90 transition-transform duration-300"></i>
                </button>
            </main>`;
        }

        // ==========================================
        // 5. TAB VIEWS & AGENDAS
        // ==========================================
        function getSortedAgendaData() {
            let combined = [];
            if (window.state.searchQuery.trim() !== '') {
                const q = window.state.searchQuery.toLowerCase();
                const mTasks = window.state.tasks.filter(t => t.title.toLowerCase().includes(q) || (t.details && t.details.toLowerCase().includes(q)));
                const mActions = window.state.projects.flatMap(p => p.actions.filter(a => a.text.toLowerCase().includes(q)).map(a => ({...a, isProjectAction: true, projectId: p.id, projectTitle: p.title})));
                combined = [...mTasks, ...mActions];
            } else {
                const aTasks = window.state.tasks.filter(t => t.date === window.state.selectedDate);
                const aActions = window.state.projects.flatMap(p => p.actions.filter(a => a.date === window.state.selectedDate).map(a => ({...a, isProjectAction: true, projectId: p.id, projectTitle: p.title})));
                combined = [...aTasks, ...aActions];
            }

            combined.sort((a, b) => {
                const aDone = a.status === 'Done';
                const bDone = b.status === 'Done';
                if (aDone && !bDone) return 1;
                if (!aDone && bDone) return -1;
                
                const pA = PRIORITY_SCORES[a.priority || 'Medium'];
                const pB = PRIORITY_SCORES[b.priority || 'Medium'];
                if (pA !== pB) return pB - pA;

                return new Date(a.date) - new Date(b.date);
            });
            return combined;
        }

        function renderAgendaList() {
            const items = getSortedAgendaData();
            if (items.length === 0) {
                return `<p class="text-xs lg:text-sm text-gray-500 italic border border-dashed p-4 rounded-xl text-center">${window.state.searchQuery ? 'No tasks found.' : 'No tasks or actions scheduled.'}</p>`;
            }

            return items.map((item) => {
                const isDone = item.status === 'Done';
                const projCat = item.isProjectAction ? window.state.projects.find(p=>p.id === item.projectId)?.category : null;
                const catColorStr = (window.state.categories.find(c => c.name === (projCat || item.category)) || {}).color || 'bg-gray-300';
                const prioClasses = PRIORITY_COLORS[item.priority || 'Medium'];

                return `
                <div class="p-3 lg:p-4 rounded-xl lg:rounded-2xl border flex items-start gap-3 lg:gap-4 transition-all relative overflow-hidden bg-white shadow-sm hover:shadow-md cursor-pointer group" onclick="window.openEditTaskModal(${item.isProjectAction ? item.projectId : null}, ${item.id}, ${item.isProjectAction})">
                    <div class="absolute left-0 top-0 bottom-0 w-1 ${isDone ? 'bg-gray-200' : catColorStr}"></div>
                    
                    <button onclick="event.stopPropagation(); window.toggleTaskStatus(${item.isProjectAction ? item.projectId : null}, ${item.id}, ${item.isProjectAction})" class="flex-shrink-0 text-gray-400 hover:${window.state.theme.mainText} mt-0.5 ml-1 lg:ml-2">
                        <i data-lucide="${isDone ? 'check-circle-2' : 'circle'}" class="w-5 h-5 lg:w-6 lg:h-6 ${isDone ? window.state.theme.mainText : ''}"></i>
                    </button>
                    
                    <div class="flex-1 overflow-hidden">
                        <div class="flex justify-between items-start mb-1">
                            <h4 class="font-bold text-sm lg:text-base truncate ${isDone ? 'line-through text-gray-400' : 'text-gray-800'}">${item.title || item.text}</h4>
                            <span class="text-[9px] border px-1.5 py-0.5 rounded font-bold flex-shrink-0 ml-2 ${isDone ? 'bg-gray-100 text-gray-400 border-gray-200' : prioClasses}">${item.priority || 'Medium'}</span>
                        </div>
                        
                        ${item.isProjectAction 
                            ? `<p class="text-[10px] lg:text-xs text-gray-500 font-medium flex items-center gap-1 truncate"><i data-lucide="briefcase" class="w-3 h-3 flex-shrink-0"></i> Project: ${item.projectTitle}</p>`
                            : `<div class="text-[10px] lg:text-xs text-gray-500 flex gap-3 truncate">
                                ${item.time && !item.isAllDay ? `<span class="flex items-center gap-1 flex-shrink-0"><i data-lucide="clock" class="w-3 h-3"></i> ${item.time}</span>` : ''}
                                ${item.category ? `<span class="flex items-center gap-1 truncate"><i data-lucide="tag" class="w-3 h-3 flex-shrink-0"></i> ${item.category}</span>` : ''}
                               </div>`
                        }
                    </div>
                </div>`;
            }).join('');
        }

        function renderHighPriorityList() {
            const hpTasks = window.state.tasks.filter(t => t.priority === 'High' && t.status !== 'Done');
            const hpActions = window.state.projects.flatMap(p => 
                p.actions.filter(a => a.priority === 'High' && a.status !== 'Done')
                         .map(a => ({...a, isProjectAction: true, projectId: p.id, projectTitle: p.title}))
            );
            let combined = [...hpTasks, ...hpActions];
            combined.sort((a,b) => new Date(a.date) - new Date(b.date));

            if (combined.length === 0) {
                return `<p class="text-xs lg:text-sm text-gray-500 italic border border-dashed p-4 rounded-xl text-center">No high priority tasks.</p>`;
            }

            return combined.map((item) => {
                const projCat = item.isProjectAction ? window.state.projects.find(p=>p.id === item.projectId)?.category : null;
                const catColorStr = (window.state.categories.find(c => c.name === (projCat || item.category)) || {}).color || 'bg-gray-300';
                const prioClasses = PRIORITY_COLORS['High'];

                return `
                <div class="p-3 lg:p-4 rounded-xl lg:rounded-2xl border flex items-start gap-3 lg:gap-4 transition-all relative overflow-hidden bg-red-50 border-red-100 shadow-sm hover:shadow-md cursor-pointer group" onclick="window.openEditTaskModal(${item.isProjectAction ? item.projectId : null}, ${item.id}, ${item.isProjectAction})">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-red-500"></div>
                    <button onclick="event.stopPropagation(); window.toggleTaskStatus(${item.isProjectAction ? item.projectId : null}, ${item.id}, ${item.isProjectAction})" class="flex-shrink-0 text-red-400 hover:text-red-600 mt-0.5 ml-1 lg:ml-2">
                        <i data-lucide="circle" class="w-5 h-5 lg:w-6 lg:h-6"></i>
                    </button>
                    <div class="flex-1 overflow-hidden">
                        <div class="flex justify-between items-start mb-1">
                            <h4 class="font-bold text-sm lg:text-base truncate text-gray-800">${item.title || item.text}</h4>
                            <span class="text-[9px] border px-1.5 py-0.5 rounded font-bold flex-shrink-0 ml-2 ${prioClasses}">High</span>
                        </div>
                        ${item.isProjectAction 
                            ? `<p class="text-[10px] lg:text-xs text-gray-600 font-medium flex items-center gap-1 truncate"><i data-lucide="briefcase" class="w-3 h-3 flex-shrink-0"></i> Project: ${item.projectTitle}</p>`
                            : `<div class="text-[10px] lg:text-xs text-gray-600 flex gap-3 truncate">
                                <span class="flex items-center gap-1 flex-shrink-0"><i data-lucide="calendar" class="w-3 h-3"></i> ${formatFullDate(item.date)}</span>
                                ${item.time && !item.isAllDay ? `<span class="flex items-center gap-1 flex-shrink-0"><i data-lucide="clock" class="w-3 h-3"></i> ${item.time}</span>` : ''}
                               </div>`
                        }
                    </div>
                </div>`;
            }).join('');
        }

        function viewDashboard() {
            let sumComp = 0, sumToDo = 0;
            window.state.tasks.forEach(t => { const d = new Date(t.date); if (d.getMonth() === window.state.calMonth && d.getFullYear() === window.state.calYear) { t.status === 'Done' ? sumComp++ : sumToDo++; }});
            window.state.projects.forEach(p => { p.actions.forEach(a => { const d = new Date(a.date); if (d.getMonth() === window.state.calMonth && d.getFullYear() === window.state.calYear) { a.status === 'Done' ? sumComp++ : sumToDo++; }});});
            
            const sumActiveProjects = window.state.projects.filter(p => {
                const start = new Date(p.startDate), end = p.endDate ? new Date(p.endDate) : new Date(2099, 11, 31);
                const filterStart = new Date(window.state.calYear, window.state.calMonth, 1), filterEnd = new Date(window.state.calYear, window.state.calMonth + 1, 0);
                return start <= filterEnd && end >= filterStart;
            }).length;

            const optsHTML = monthOptions.map(opt => `<option value="${opt.m}-${opt.y}" ${opt.m === window.state.calMonth && opt.y === window.state.calYear ? 'selected' : ''}>${opt.label}</option>`).join('');

            return `
            <div class="space-y-6 lg:space-y-8">
                <section>
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg lg:text-xl font-bold">Task Summary</h2>
                        <div class="relative">

        function viewMyTasks() {
            const daysInMonth = new Date(window.state.calYear, window.state.calMonth + 1, 0).getDate();
            const startDay = new Date(window.state.calYear, window.state.calMonth, 1).getDay();
            
            let calDaysHTML = '';
            for(let i = 0; i < startDay; i++) calDaysHTML += `<div class="min-h-[60px] lg:min-h-[100px] border border-gray-50 rounded-lg lg:rounded-xl bg-gray-50/50 p-1 lg:p-2"></div>`;
            
            for(let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${window.state.calYear}-${String(window.state.calMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isSelected = window.state.selectedDate === dateStr;
                const isToday = dateStr === TODAY;
                
                const dayTasks = window.state.tasks.filter(t => t.date === dateStr);
                const activeProjects = window.state.projects.filter(p => dateStr >= p.startDate && (!p.endDate || dateStr <= p.endDate));

                let projBlocks = activeProjects.map(p => {
                    const color = (window.state.categories.find(c => c.name === p.category) || {}).color || 'bg-gray-500';
                    return `<div class="${color} text-transparent sm:text-white text-[8px] sm:text-[10px] px-0.5 sm:px-1.5 py-0.5 sm:truncate font-medium shadow-sm mb-[1px] h-1.5 sm:h-auto"><span class="hidden sm:inline">${p.title}</span></div>`;
                }).join('');

                let taskDots = dayTasks.map(t => {
                    const color = (window.state.categories.find(c => c.name === t.category) || {}).color || 'bg-gray-500';
                    return `<div class="flex items-center gap-1 overflow-hidden"><div class="w-1 lg:w-1.5 h-1 lg:h-1.5 rounded-full flex-shrink-0 ${color}"></div><span class="text-[8px] lg:text-[10px] font-medium truncate hidden sm:inline ${t.status === 'Done' ? 'line-through text-gray-400' : 'text-gray-700'}">${t.title}</span></div>`;
                }).join('');

                calDaysHTML += `
                <div onclick="window.selectDate('${dateStr}')" class="min-h-[60px] lg:min-h-[110px] border rounded-lg lg:rounded-xl relative transition cursor-pointer flex flex-col overflow-hidden ${isSelected ? `${window.state.theme.mainBorder} shadow-md ${window.state.theme.lightBg}` : 'border-gray-200 bg-white hover:border-gray-300'}">
                    <div class="w-full flex flex-col mb-0.5 lg:mb-1">${projBlocks}</div>
                    <div class="px-1 lg:px-2 pb-1 lg:pb-2 flex-1 flex flex-col">
                        <div class="flex justify-between items-center mb-0.5 lg:mb-1">
                            <span class="text-[10px] lg:text-sm font-bold w-5 h-5 lg:w-6 lg:h-6 flex items-center justify-center rounded-full ${isToday ? 'bg-orange-500 text-white' : (isSelected ? `${window.state.theme.mainBg} text-white` : 'text-gray-600')}">${day}</span>
                        </div>
                        <div class="flex-1 overflow-hidden space-y-0.5 lg:space-y-1 mt-0.5 lg:mt-1">${taskDots}</div>
                    </div>
                </div>`;
            }

            return `
            <div class="flex flex-col gap-6 lg:gap-8 h-full">
                <!-- Calendar -->
                <div class="bg-white p-4 lg:p-6 rounded-2xl lg:rounded-3xl shadow-sm border border-gray-100 overflow-x-auto">
                    <div class="flex justify-between items-center mb-4 lg:mb-6 min-w-[300px]">
                        <h2 class="text-xl lg:text-2xl font-bold">${MONTH_NAMES[window.state.calMonth]} ${window.state.calYear}</h2>
                        <div class="flex gap-2">
                            <button onclick="window.changeMonth(-1)" class="p-1.5 lg:p-2 border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-50" ${window.state.calYear === 2026 && window.state.calMonth === 5 ? 'disabled' : ''}><i data-lucide="chevron-left" class="w-4 h-4 lg:w-5 lg:h-5 text-gray-600"></i></button>
                            <button onclick="window.changeMonth(1)" class="p-1.5 lg:p-2 border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-50" ${window.state.calYear === 2030 && window.state.calMonth === 11 ? 'disabled' : ''}><i data-lucide="chevron-right" class="w-4 h-4 lg:w-5 lg:h-5 text-gray-600"></i></button>
                        </div>
                    </div>
                    <div class="grid grid-cols-7 gap-1 lg:gap-2 mb-1 lg:mb-2 min-w-[300px]">
                        ${['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => `<div class="text-center text-[10px] lg:text-sm font-semibold text-gray-400 py-1 lg:py-2">${window.innerWidth < 640 ? d.charAt(0) : d}</div>`).join('')}
                    </div>
                    <div class="grid grid-cols-7 gap-1 lg:gap-2 min-w-[300px]">${calDaysHTML}</div>
                </div>
                <!-- Agenda -->
                <div class="bg-white p-4 lg:p-6 rounded-2xl lg:rounded-3xl shadow-sm border border-gray-100 flex-1">
                    <h2 class="text-lg lg:text-xl font-bold mb-4 lg:mb-6 flex items-center gap-2">
                        <i data-lucide="clock" class="w-5 h-5 lg:w-6 lg:h-6 ${window.state.theme.mainText}"></i>
                        ${window.state.searchQuery ? 'Search Results' : 'Agenda'} <span class="text-xs lg:text-sm font-normal text-gray-500">(${window.state.searchQuery ? `"${window.state.searchQuery}"` : formatFullDate(window.state.selectedDate)})</span>
                    </h2>
                    <div class="space-y-3 lg:space-y-4" id="agenda-list-container">
                        ${renderAgendaList()}
                    </div>
                </div>
            </div>`;
        }

        function viewProjects() {
            const projectsHTML = window.state.projects.map(project => {
                const catColor = (window.state.categories.find(c => c.name === project.category) || {}).color || 'bg-gray-500';
                const KANBAN_COLS = ['To Do', 'In Progress', 'Done'];
                
                const boardHTML = KANBAN_COLS.map(status => {
                    const colActions = project.actions.filter(a => a.status === status);
                    colActions.sort((a,b) => {
                       const pA = PRIORITY_SCORES[a.priority || 'Medium'];
                       const pB = PRIORITY_SCORES[b.priority || 'Medium'];
                       if(pA !== pB) return pB - pA;
                       return new Date(a.date) - new Date(b.date);
                    });
                    
                    const cardsHTML = colActions.map(action => {
                        const isDeadlineToday = action.date === TODAY && status !== 'Done';
                        const isOverdue = action.date < TODAY && status !== 'Done';
                        const dateClass = isDeadlineToday ? 'text-red-600 font-bold' : (isOverdue ? 'text-red-800 font-bold' : 'text-gray-500');
                        const prioClasses = PRIORITY_COLORS[action.priority || 'Medium'];
                        
                        return `
                        <div draggable="true" ondragstart="window.dragStart(event, ${project.id}, ${action.id})" onclick="window.openEditTaskModal(${project.id}, ${action.id}, true)" class="kanban-card bg-white p-3 rounded-xl shadow-sm border border-gray-100 hover:shadow-md hover:border-gray-300 transition group relative">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[10px] border px-1.5 py-0.5 rounded font-bold ${status === 'Done' ? 'bg-gray-100 text-gray-400 border-gray-200' : prioClasses}">${action.priority || 'Medium'}</span>
                                <span class="text-[10px] ${dateClass}">${action.date}</span>
                            </div>
                            <h5 class="text-sm font-bold leading-tight ${status === 'Done' ? 'line-through text-gray-400' : 'text-gray-800'}">${action.text}</h5>
                            ${action.details ? `<p class="text-xs text-gray-500 mt-2 line-clamp-2">${action.details}</p>` : ''}
                        </div>`;
                    }).join('');
                    
                    return `
                    <div class="flex-1 min-w-[260px] bg-gray-50 rounded-2xl p-3 border border-gray-100 flex flex-col" ondragover="window.allowDrop(event)" ondrop="window.dropCard(event, ${project.id}, '${status}')">
                        <div class="flex justify-between items-center mb-3 px-1">
                            <h4 class="font-bold text-gray-700 text-sm flex items-center gap-2">
                                <div class="w-2 h-2 rounded-full ${status === 'Done' ? 'bg-green-500' : (status === 'In Progress' ? 'bg-blue-500' : 'bg-gray-400')}"></div>
                                ${status}
                            </h4>
                            <span class="bg-gray-200 text-gray-600 text-xs font-bold px-2 py-0.5 rounded-full">${colActions.length}</span>
                        </div>
                        <div class="space-y-3 flex-1 min-h-[150px]">
                            ${cardsHTML}
                        </div>
                    </div>`;
                }).join('');

                return `
                <div class="bg-white rounded-3xl p-5 lg:p-6 shadow-sm border border-gray-100 relative group overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-1.5 ${catColor}"></div>
                    <div class="flex flex-col sm:flex-row sm:justify-between items-start gap-4 mb-6 mt-2">
                        <div>
                            <div class="flex items-center gap-2 lg:gap-3">
                                <h3 class="text-xl lg:text-2xl font-bold text-gray-800">${project.title}</h3>
                                <button onclick="window.openProjectSettings(${project.id})" class="p-1.5 text-gray-400 hover:${window.state.theme.mainText} hover:${window.state.theme.lightBg} rounded-lg transition" title="Project Settings">
                                    <i data-lucide="settings" class="w-4 h-4"></i>
                                </button>
                            </div>
                            <p class="text-xs lg:text-sm text-gray-500 mt-1 flex flex-wrap items-center gap-2">
                                <span class="flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3 lg:w-4 lg:h-4"></i> ${formatFullDate(project.startDate)} - ${project.endDate ? formatFullDate(project.endDate) : 'Ongoing'}</span>
                                ${project.category ? `<span class="px-2 py-0.5 text-white rounded text-[10px] lg:text-xs ${catColor}">${project.category}</span>` : ''}
                            </p>
                        </div>
                        <div class="text-left sm:text-right">
                            <span class="text-xl lg:text-2xl font-bold ${window.state.theme.mainText}">${project.progress}%</span>
                            <p class="text-[10px] lg:text-xs text-gray-400">Completed</p>
                        </div>
                    </div>
                    
                    <div class="flex gap-4 overflow-x-auto pb-4 snap-x">
                        ${boardHTML}
                    </div>
                </div>`;
            }).join('');

            return `
            <div class="space-y-6">
                <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 mb-6">
                    <h2 class="text-xl lg:text-2xl font-bold">Active Projects</h2>
                    <button onclick="window.openCreateProjectModal()" class="${window.state.theme.mainBg} text-white px-4 py-2 rounded-xl text-sm font-semibold ${window.state.theme.hoverBg} transition flex items-center justify-center gap-2">
                        <i data-lucide="plus" class="w-4 h-4"></i> New Project
                    </button>
                </div>
                ${projectsHTML}
            </div>`;
        }

        function renderUnifiedTaskModal() {
            const data = window.state.taskModalData;
            if (!data) return '';
            const isEditing = data.isEdit;

            const projOpts = window.state.projects.map(p => `<option value="${p.id}" ${data.projectId == p.id ? 'selected' : ''}>${p.title}</option>`).join('');
            const catOpts = window.state.categories.map(c => `<option value="${c.name}" ${data.category == c.name ? 'selected' : ''}>${c.name}</option>`).join('');
            
            const STATUSES = ['To Do', 'In Progress', 'Done'];
            const statusOpts = STATUSES.map(s => `<option value="${s}" ${data.status == s ? 'selected' : ''}>${s}</option>`).join('');
            
            const PRIORITIES = ['Low', 'Medium', 'High'];
            const priorityOpts = PRIORITIES.map(p => `<option value="${p}" ${data.priority == p ? 'selected' : ''}>${p}</option>`).join('');

            return `

                                    <option value="">-- Standalone Task --</option>
                                    ${projOpts}
                                </select>
                            </div>
                            ${!data.projectId ? `
                            <div>

                                <select id="utm-category" class="w-full border border-gray-200 rounded-xl px-3 py-2 lg:py-3 text-xs lg:text-sm outline-none bg-white focus:ring-1 focus:ring-gray-300">

                                    ${catOpts}
                                </select>
                            </div>` : '<div class="hidden"><input type="hidden" id="utm-category" value=""/></div>'}

                                <select id="utm-status" class="w-full border border-gray-200 rounded-xl px-3 py-2 lg:py-3 text-xs lg:text-sm outline-none bg-white font-medium">
                                    ${statusOpts}
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs lg:text-sm font-bold text-gray-700 mb-1 lg:mb-2 flex items-center gap-1.5 lg:gap-2"><i data-lucide="alert-circle" class="w-3 h-3"></i> Priority Level</label>
                                <select id="utm-priority" class="w-full border border-gray-200 rounded-xl px-3 py-2 lg:py-3 text-xs lg:text-sm outline-none bg-white font-medium">
                                    ${priorityOpts}

                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3 lg:gap-4 bg-gray-50 p-3 lg:p-4 rounded-xl lg:rounded-2xl border border-gray-100">

                        </div>

                    </div>
                    <div class="p-4 lg:p-6 border-t border-gray-100 flex gap-3 flex-shrink-0 bg-white">
                        ${isEditing ? `<button onclick="window.deleteUnifiedTask()" class="flex-shrink-0 p-3 lg:p-3.5 bg-red-50 text-red-600 hover:bg-red-100 rounded-xl transition" title="Delete Task"><i data-lucide="trash-2" class="w-5 h-5"></i></button>` : ''}
                        <button onclick="window.saveUnifiedTask()" class="flex-1 bg-gray-900 text-white font-bold py-3 lg:py-3.5 rounded-xl ${window.state.theme.hoverBg} transition text-sm lg:text-base">Save Task Details</button>
                    </div>
                </div>
            </div>`;
        }

        function renderProjectSettingsModal() {
            const data = window.state.projectForm;
            if(!data) return '';
            
            const catOpts = window.state.categories.map(c => `<option value="${c.name}" ${data.category == c.name ? 'selected' : ''}>${c.name}</option>`).join('');
            const colorBtns = TAILWIND_COLORS.map(color => `<button onclick="window.setNewCategoryColor('${color}')" class="w-5 h-5 lg:w-6 lg:h-6 rounded-full flex-shrink-0 ${color} ${window.state.newCategoryColor === color ? 'ring-2 ring-offset-1 ring-gray-800' : ''}"></button>`).join('');

            return `
            <div class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-2 sm:p-4">
                <div class="bg-white rounded-2xl lg:rounded-3xl shadow-xl w-full max-w-xl overflow-hidden flex flex-col max-h-[90vh]">
                    <div class="flex justify-between items-center p-4 lg:p-6 border-b border-gray-100 flex-shrink-0">
                        <h3 class="text-base lg:text-xl font-bold">${window.state.isEditingProject ? 'Edit Project Settings' : 'Create New Project'}</h3>
                        <button onclick="window.closeProjectModal()" class="text-gray-400 hover:bg-gray-100 p-1.5 lg:p-2 rounded-full"><i data-lucide="x" class="w-4 h-4 lg:w-5 lg:h-5"></i></button>
                    </div>
                    <div class="overflow-y-auto p-4 lg:p-6 scrollbar-hide flex-1 space-y-4 lg:space-y-6">
                        <div>
                            <label class="block text-xs lg:text-sm font-bold text-gray-700 mb-1 lg:mb-2">Project Title</label>
                            <input type="text" id="pf-title" value="${data.title.replace(/"/g, '&quot;')}" placeholder="e.g., Q4 Campaign" class="w-full border border-gray-200 rounded-xl px-3 lg:px-4 py-2 lg:py-3 text-sm lg:text-lg font-medium outline-none" />
                        </div>
                        <div class="grid grid-cols-2 gap-3 lg:gap-4">
                            <div>
                                <label class="block text-xs lg:text-sm font-bold text-gray-700 mb-1 lg:mb-2">Start Date</label>
                                <input type="date" id="pf-start" value="${data.startDate}" class="w-full border border-gray-200 rounded-xl px-2 lg:px-4 py-2 lg:py-2.5 text-xs lg:text-sm outline-none" />
                            </div>
                            <div>
                                <label class="block text-xs lg:text-sm font-bold text-gray-700 mb-1 lg:mb-2">End Date</label>
                                <input type="date" id="pf-end" value="${data.endDate}" class="w-full border border-gray-200 rounded-xl px-2 lg:px-4 py-2 lg:py-2.5 text-xs lg:text-sm outline-none" />
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs lg:text-sm font-bold text-gray-700 mb-1 lg:mb-2">Category & Color</label>
                            <div class="flex flex-col gap-2 lg:gap-3 mb-2 lg:mb-3 bg-gray-50 p-2 lg:p-3 rounded-xl border border-gray-100">
                                <div class="flex gap-2">
                                    <input type="text" id="new-cat-input" value="${window.state.newCategoryInput}" placeholder="Add new category..." class="flex-1 border border-gray-200 rounded-lg px-2 lg:px-3 py-1.5 lg:py-2 text-xs lg:text-sm outline-none" />
                                    <button onclick="window.addNewCategory()" class="bg-gray-200 text-gray-700 px-3 lg:px-4 py-1.5 lg:py-2 rounded-lg text-xs lg:text-sm font-bold hover:bg-gray-300">Add</button>
                                </div>
                                <div class="flex gap-2 overflow-x-auto pb-1 scrollbar-hide snap-x">${colorBtns}</div>
                            </div>
                            <select id="pf-cat" class="w-full border border-gray-200 rounded-xl px-3 lg:px-4 py-2 lg:py-3 text-xs lg:text-sm bg-white outline-none">
                                <option value="" disabled ${!data.category ? 'selected' : ''}>${window.state.categories.length === 0 ? "No categories" : "Select category..."}</option>
                                ${catOpts}
                            </select>
                        </div>
                    </div>
                    <div class="p-4 lg:p-6 border-t border-gray-100 bg-white flex flex-shrink-0 gap-3">
                        ${window.state.isEditingProject ? `<button onclick="window.deleteProject()" class="p-3 lg:p-3.5 bg-red-50 text-red-600 hover:bg-red-100 rounded-xl transition" title="Delete Project"><i data-lucide="trash-2" class="w-5 h-5"></i></button>` : ''}
                        <button onclick="window.saveProject()" class="flex-1 ${window.state.theme.mainBg} text-white font-bold py-2.5 lg:py-3.5 rounded-xl ${window.state.theme.hoverBg} transition text-sm lg:text-base">
                            ${window.state.isEditingProject ? 'Save Project Settings' : 'Create Project'}
                        </button>
                    </div>
                </div>
            </div>`;
        }

        // ==========================================
        // 7. EVENT HANDLERS & LOGIC
        // ==========================================
        window.setActiveTab = (tabId) => { window.state.activeTab = tabId; renderApp(); };
        
        window.saveSettingsName = () => { 
            const val = document.getElementById('settings-username').value;
            window.state.userName = val; 
            window.saveToStorage(); 
            renderApp(); 
        };

        window.changeTheme = (themeId) => { window.state.theme = THEMES.find(t => t.id === themeId); window.saveToStorage(); renderApp(); };
        window.handleSearch = (val) => { window.state.searchQuery = val; refreshTab(); };
        window.changeSummaryMonth = (val) => { const [m, y] = val.split('-'); window.state.calMonth = parseInt(m); window.state.calYear = parseInt(y); refreshTab(); };
        window.changeMonth = (offset) => {
            let newM = window.state.calMonth + offset; let newY = window.state.calYear;
            if (newM > 11) { newM = 0; newY++; } else if (newM < 0) { newM = 11; newY--; }
            if (newY < 2026 || (newY === 2026 && newM < 5) || newY > 2030) return;
            window.state.calMonth = newM; window.state.calYear = newY;
            refreshTab();
        };
        window.selectDate = (dateStr) => { window.state.selectedDate = dateStr; refreshTab(); };

        // Toggle Status
        window.toggleTaskStatus = (projectId, taskId, isAction) => {
            if (isAction) {
                window.state.projects = window.state.projects.map(p => {
                    if (p.id === projectId) {
                        p.actions = p.actions.map(a => {
                            if(a.id === taskId) {
                                const newStatus = a.status === 'Done' ? 'To Do' : 'Done';
                                return { ...a, status: newStatus, isCompleted: newStatus === 'Done' };
                            }
                            return a;
                        });
                        const comp = p.actions.filter(a => a.status === 'Done').length;
                        p.progress = p.actions.length === 0 ? 0 : Math.round((comp / p.actions.length) * 100);
                    }
                    return p;
                });
            } else {
                window.state.tasks = window.state.tasks.map(t => {
                    if(t.id === taskId) {
                        const newStatus = t.status === 'Done' ? 'To Do' : 'Done';
                        return { ...t, status: newStatus, done: newStatus === 'Done' };
                    }
                    return t;
                });
            }
            window.saveToStorage(); refreshTab();
        };

        // KANBAN DRAG AND DROP
        window.dragStart = (e, pId, aId) => {
            e.dataTransfer.setData('text/plain', JSON.stringify({ pId, aId }));
        };
        window.allowDrop = (e) => { e.preventDefault(); };
        window.dropCard = (e, targetPId, newStatus) => {
            e.preventDefault();
            const dataStr = e.dataTransfer.getData('text/plain');
            if(!dataStr) return;
            const data = JSON.parse(dataStr);
            
            if(data.pId === targetPId) {
                window.state.projects = window.state.projects.map(p => {
                    if (p.id === targetPId) {
                        p.actions = p.actions.map(a => a.id === data.aId ? { ...a, status: newStatus, isCompleted: newStatus === 'Done' } : a);
                        const comp = p.actions.filter(a => a.status === 'Done').length;
                        p.progress = p.actions.length === 0 ? 0 : Math.round((comp / p.actions.length) * 100);
                    }
                    return p;
                });
                window.saveToStorage(); refreshTab();
            }
        };

        // UNIFIED TASK MODAL
        window.openCreateTaskModal = () => {
            window.state.taskModalData = { id: null, title: '', projectId: '', status: 'To Do', priority: 'Medium', date: TODAY, time: '', isAllDay: false, details: '', category: '', isEdit: false };
            window.state.isTaskModalOpen = true; renderModals();
        };

        window.openEditTaskModal = (projectId, taskId, isAction) => {
            if (isAction) {
                const proj = window.state.projects.find(p => p.id === projectId);
                const act = proj.actions.find(a => a.id === taskId);
                window.state.taskModalData = { id: act.id, title: act.text, projectId: proj.id, status: act.status, priority: act.priority, date: act.date, time: '', isAllDay: false, details: act.details || '', category: proj.category, isEdit: true };
            } else {
                const task = window.state.tasks.find(t => t.id === taskId);
                window.state.taskModalData = { ...task, projectId: '', isEdit: true };
            }
            window.state.isTaskModalOpen = true; renderModals();
        };

        window.closeTaskModal = () => { window.state.isTaskModalOpen = false; renderModals(); };
        
        window.updateModalProject = (val) => {
            window.state.taskModalData.projectId = val;
            renderModals();
        };

        window.toggleModalAllDay = (checked) => { 
            window.state.taskModalData.isAllDay = checked; 
            if(checked) window.state.taskModalData.time = ''; 
            renderModals(); 
        };

        window.saveUnifiedTask = () => {
            const d = window.state.taskModalData;
            const title = document.getElementById('utm-title').value;
            if (!title) return;

            const projId = document.getElementById('utm-project').value;
            const status = document.getElementById('utm-status').value;
            const priority = document.getElementById('utm-priority').value;
            const date = document.getElementById('utm-date').value;
            const details = document.getElementById('utm-details').value;
            const catEl = document.getElementById('utm-category');
            const category = catEl ? catEl.value : '';
            
            const isAllDayEl = document.getElementById('utm-allday');
            const isAllDay = isAllDayEl ? isAllDayEl.checked : false;
            const timeEl = document.getElementById('utm-time');
            const time = isAllDay ? '' : (timeEl ? timeEl.value : '');

            const isDone = status === 'Done';

            if (d.isEdit) {
                if (d.projectId) { // Editing Project Action
                    window.state.projects = window.state.projects.map(p => {
                        if (p.id === d.projectId) {
                            p.actions = p.actions.map(a => a.id === d.id ? { ...a, text: title, date, priority, status, details, isCompleted: isDone } : a);
                            const comp = p.actions.filter(a => a.status === 'Done').length;
                            p.progress = Math.round((comp / p.actions.length) * 100);
                        }
                        return p;
                    });
                } else { // Editing Standalone Task
                    window.state.tasks = window.state.tasks.map(t => t.id === d.id ? { ...t, title, date, time, isAllDay, priority, status, details, category, done: isDone } : t);
                }
            } else {
                // Creating new
                if (projId) {
                    window.state.projects = window.state.projects.map(p => {
                        if (p.id === parseInt(projId)) {
                            p.actions.push({ id: Date.now(), text: title, date, priority, status, details, isCompleted: isDone });
                            const comp = p.actions.filter(a => a.status === 'Done').length;
                            p.progress = Math.round((comp / p.actions.length) * 100);
                        }
                        return p;
                    });
                } else {
                    window.state.tasks.push({ id: Date.now(), title, date, time, priority, status, details, category, done: isDone, isAllDay });
                }
            }

            window.state.isTaskModalOpen = false; window.saveToStorage(); renderModals(); refreshTab();
        };

        window.deleteUnifiedTask = () => {
            const d = window.state.taskModalData;
            if (d.projectId) {
                window.state.projects = window.state.projects.map(p => {
                    if (p.id === d.projectId) {
                        p.actions = p.actions.filter(a => a.id !== d.id);
                        const comp = p.actions.filter(a => a.status === 'Done').length;
                        p.progress = p.actions.length === 0 ? 0 : Math.round((comp / p.actions.length) * 100);
                    }
                    return p;
                });
            } else {
                window.state.tasks = window.state.tasks.filter(t => t.id !== d.id);
            }
            window.state.isTaskModalOpen = false; window.saveToStorage(); renderModals(); refreshTab();
        };

        // Project Modals
        window.openCreateProjectModal = () => {
            window.state.projectForm = { id: null, title: '', startDate: TODAY, endDate: '', category: '' };
            window.state.isEditingProject = false; window.state.isProjectModalOpen = true; renderModals();
        };
        window.openProjectSettings = (id) => {
            const proj = window.state.projects.find(p => p.id === id);
            window.state.projectForm = { id: proj.id, title: proj.title, startDate: proj.startDate, endDate: proj.endDate, category: proj.category };
            window.state.isEditingProject = true; window.state.isProjectModalOpen = true; renderModals();
        };
        window.closeProjectModal = () => { window.state.isProjectModalOpen = false; window.state.isEditingProject = false; renderModals(); };
        
        window.saveProject = () => {
            const title = document.getElementById('pf-title').value;
            if (!title) return;
            const startDate = document.getElementById('pf-start').value;
            const endDate = document.getElementById('pf-end').value;
            const category = document.getElementById('pf-cat').value;

            if (window.state.isEditingProject) {
                window.state.projects = window.state.projects.map(p => p.id === window.state.projectForm.id ? { ...p, title, startDate, endDate, category } : p);
            } else {
                window.state.projects.push({ id: Date.now(), title, startDate, endDate, category, progress: 0, actions: [] });
            }

            window.state.isProjectModalOpen = false; window.state.isEditingProject = false; window.saveToStorage(); renderModals(); refreshTab();
        };
        
        window.deleteProject = () => {
            window.state.projects = window.state.projects.filter(p => p.id !== window.state.projectForm.id);
            window.state.isProjectModalOpen = false; window.saveToStorage(); renderModals(); refreshTab();
        };

        window.setNewCategoryColor = (color) => { window.state.newCategoryColor = color; renderModals(); };
        window.addNewCategory = () => {
            const input = document.getElementById('new-cat-input').value;
            if (input.trim() && !window.state.categories.find(c => c.name === input.trim())) {
                window.state.categories.push({ name: input.trim(), color: window.state.newCategoryColor });
                if(window.state.isProjectModalOpen) window.state.projectForm.category = input.trim();
                window.saveToStorage(); renderModals();
            }
        };

        // ==========================================
        // 8. INITIALIZE APP
        // ==========================================
        loadFromStorage();
        renderApp();

    </script>
</body>
</html>
