<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nytask! Dashboard</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logo.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        .kanban-card { cursor: grab; }
        .kanban-card:active { cursor: grabbing; }
        
        /* Smooth transitions for dark mode */
        * { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
    </style>
</head>
<!-- Default to light mode (slate-50), will be overridden by JS if dark mode is selected -->
<body class="bg-slate-50 font-sans overflow-hidden text-gray-800" id="body">
    
    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center gap-4">
        <i data-lucide="loader-2" class="w-10 h-10 animate-spin text-[#285c54]"></i>
        <p class="font-bold text-gray-500 tracking-wide animate-pulse" id="loading-text">Checking Authentication...</p>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 bg-slate-50 z-[90] hidden flex-col items-center justify-center p-6 text-center">
        <div class="bg-white p-8 lg:p-10 rounded-3xl shadow-xl max-w-md w-full flex flex-col items-center border border-gray-100">
            <!-- Logo -->
            <div class="h-12 lg:h-14 mb-6 flex items-center justify-center">
                <img src="logo.png" alt="nytask!" class="h-full object-contain" onerror="this.onerror=null; this.outerHTML='<span class=\\'font-extrabold text-4xl lg:text-5xl tracking-tight text-[#285c54]\\'>nytask!</span>'">
            </div>

            <h1 class="text-2xl font-bold text-gray-800 mb-2">Welcome to nytask!</h1>
            <p class="text-sm text-gray-500 mb-8">Sign in to sync your tasks, projects, and agendas across all your devices.</p>
            
            <button onclick="window.loginWithGoogle()" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-200 text-gray-700 font-bold py-3.5 px-4 rounded-xl hover:bg-gray-50 transition shadow-sm">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </button>
        </div>
    </div>

    <!-- Main App Wrapper -->
    <div id="app" class="hidden flex-col lg:flex-row h-screen w-full relative z-10"></div>
    
    <!-- Footer Watermark -->
    <div class="fixed bottom-2 right-4 text-[10px] text-gray-400 z-50 pointer-events-none tracking-widest font-medium">
        created by netalen priscyla
    </div>

    <!-- Modals Wrapper -->
    <div id="modal-root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // ==========================================
        // 0. FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCxhoCNVQFp9gdQ_fxNi7fjq5YcWkhih6I",
            authDomain: "tasktracker-net.firebaseapp.com",
            projectId: "tasktracker-net",
            storageBucket: "tasktracker-net.firebasestorage.app",
            messagingSenderId: "53658095983",
            appId: "1:53658095983:web:04ced390c5c14b96bd189a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // ==========================================
        // 1. CONSTANTS, TIME & TELEGRAM
        // ==========================================
        const TELEGRAM_BOT_TOKEN = "8620644076:AAFMscJ0jQN5PKiGHMA6gGi7cqDC4WRO7W8"; // Disediakan oleh sistem

        const dateObj = new Date();
        const TODAY = dateObj.getFullYear() + '-' + String(dateObj.getMonth() + 1).padStart(2, '0') + '-' + String(dateObj.getDate()).padStart(2, '0');
        
        const TAILWIND_COLORS = ['bg-red-500', 'bg-orange-500', 'bg-amber-500', 'bg-green-500', 'bg-teal-500', 'bg-blue-500', 'bg-indigo-500', 'bg-purple-500', 'bg-pink-500'];
        const MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const DAYS_NAMES = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

        // Theme configurations with dark mode support tags
        const THEMES = [
            { id: 'teal', name: 'Teal', mainBg: 'bg-[#285c54]', mainText: 'text-[#285c54]', mainBorder: 'border-[#285c54]', hoverBg: 'hover:bg-[#1e4740]', lightBg: 'bg-[#eef7f5]', accentText: 'text-[#a7d3cb]', isDark: false },
            { id: 'blue', name: 'Pacific Blue', mainBg: 'bg-[#0096c7]', mainText: 'text-[#0096c7]', mainBorder: 'border-[#0096c7]', hoverBg: 'hover:bg-[#0077b6]', lightBg: 'bg-[#e0f2fe]', accentText: 'text-[#bae6fd]', isDark: false },
            { id: 'rose', name: 'Rose', mainBg: 'bg-[#be123c]', mainText: 'text-[#be123c]', mainBorder: 'border-[#be123c]', hoverBg: 'hover:bg-[#9f1239]', lightBg: 'bg-[#fff1f2]', accentText: 'text-[#fecdd3]', isDark: false },
            { id: 'peach', name: 'Peach', mainBg: 'bg-[#ea580c]', mainText: 'text-[#ea580c]', mainBorder: 'border-[#ea580c]', hoverBg: 'hover:bg-[#c2410c]', lightBg: 'bg-[#fff7ed]', accentText: 'text-[#fed7aa]', isDark: false },
            { id: 'dark', name: 'Dark Mode', mainBg: 'bg-gray-900', mainText: 'text-gray-100', mainBorder: 'border-gray-600', hoverBg: 'hover:bg-black', lightBg: 'bg-gray-800', accentText: 'text-gray-400', isDark: true }
        ];

        const TABS = [
            { id: 'Dashboard', name: 'Dashboard', icon: 'home' },
            { id: 'Details', name: 'Details', icon: 'briefcase' },
            { id: 'Calendar', name: 'Calendar', icon: 'calendar' },
            { id: 'Settings', name: 'Settings', icon: 'settings' }
        ];

        const PRIORITY_SCORES = { 'High': 3, 'Medium': 2, 'Low': 1 };
        
        // Priority colors adapt slightly to dark mode for readability
        const getPriorityColors = (isDark) => ({
            'High': isDark ? 'bg-red-900/50 text-red-400 border-red-800/50' : 'bg-red-100 text-red-700 border-red-200', 
            'Medium': isDark ? 'bg-orange-900/50 text-orange-400 border-orange-800/50' : 'bg-orange-100 text-orange-700 border-orange-200', 
            'Low': isDark ? 'bg-blue-900/50 text-blue-400 border-blue-800/50' : 'bg-blue-100 text-blue-700 border-blue-200' 
        });

        window.formatFullDate = function(dateStr) {
            if (!dateStr) return ''; const d = new Date(dateStr); if (isNaN(d.getTime())) return dateStr;
            return `${DAYS_NAMES[d.getDay()]}, ${d.getDate().toString().padStart(2, '0')} ${MONTH_NAMES[d.getMonth()]} ${d.getFullYear()}`;
        };

        // ==========================================
        // 2. STATE MANAGEMENT 
        // ==========================================
        window.state = {
            currentUser: null,
            activeTab: 'Dashboard', userName: 'Netalen', theme: THEMES[0], 
            dashboardViewMode: 'all', showMonthSummary: false,
            
            // Telegram Preferences
            telegramUsername: '',
            telegramChatId: '',
            autoReminderEnabled: false,
            lastReminderSentDate: '', // To prevent spamming everyday
            
            tasks: [], projects: [],
            calMonth: dateObj.getMonth(), calYear: dateObj.getFullYear(), selectedDate: TODAY,
            
            isTaskModalOpen: false, taskModalData: null,
            isProjectModalOpen: false, projectForm: null,
            newCategoryColor: TAILWIND_COLORS[0],
        };

        let unsubscribeSnapshot = null;

        // AUTHENTICATION LISTENER
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.state.currentUser = user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('loading-text').innerText = 'Syncing your data...';
                document.getElementById('loading-screen').style.display = 'flex';

                const docRef = doc(db, 'artifacts', 'nytask', 'users', user.uid);

                if (unsubscribeSnapshot) unsubscribeSnapshot();

                unsubscribeSnapshot = onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        window.state.userName = data.userName || user.displayName || 'User';
                        window.state.theme = THEMES.find(t=>t.id === data.themeId) || THEMES[0];
                        
                        window.state.telegramUsername = data.telegramUsername || '';
                        window.state.telegramChatId = data.telegramChatId || '';
                        window.state.autoReminderEnabled = data.autoReminderEnabled || false;
                        window.state.lastReminderSentDate = data.lastReminderSentDate || '';

                        window.state.tasks = data.tasks || [];
                        window.state.projects = data.projects || [];
                        window.state.projects.forEach(p => { if(typeof p.isCollapsed === 'undefined') p.isCollapsed = false; });
                    } else {
                        window.state.userName = user.displayName || 'User';
                        window.state.tasks = []; window.state.projects = [];
                    }
                    
                    document.getElementById('loading-screen').style.display = 'none';
                    window.applyThemeGlobal();
                    window.renderApp();
                    window.refreshTab();

                    // Check if we need to send auto reminder TODAY
                    window.checkAndSendAutoReminder();

                }, (err) => {
                    console.error("Firebase Sync Error:", err);
                    document.getElementById('loading-screen').style.display = 'none';
                });

                window.saveToStorage = async function(triggerRender = true) {
                    if(!window.state.currentUser) return;
                    const dataToSave = {
                        userName: window.state.userName,
                        themeId: window.state.theme.id,
                        telegramUsername: window.state.telegramUsername,
                        telegramChatId: window.state.telegramChatId,
                        autoReminderEnabled: window.state.autoReminderEnabled,
                        lastReminderSentDate: window.state.lastReminderSentDate,
                        tasks: window.state.tasks,
                        projects: window.state.projects
                    };
                    try { await setDoc(docRef, dataToSave); } catch(e) { console.error("Save failed:", e); }
                    if (triggerRender) { window.applyThemeGlobal(); window.renderApp(); window.refreshTab(); }
                };

            } else {
                window.state.currentUser = null;
                if (unsubscribeSnapshot) unsubscribeSnapshot();
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('app').style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app').innerHTML = '';
            }
        });

        // LOGIN LOGOUT
        window.loginWithGoogle = () => {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('loading-text').innerText = 'Signing in...';
            document.getElementById('loading-screen').style.display = 'flex';
            signInWithPopup(auth, provider).catch(error => {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
                alert("Failed to login: " + error.message);
            });
        };
        window.logout = () => signOut(auth).catch(error => console.error("Logout error", error));

        // ==========================================
        // 3. CORE RENDERING ENGINE & THEME APPLY
        // ==========================================
        window.applyThemeGlobal = function() {
            const body = document.getElementById('body');
            if (window.state.theme.isDark) {
                body.classList.remove('bg-slate-50', 'text-gray-800');
                body.classList.add('bg-gray-950', 'text-gray-200');
            } else {
                body.classList.remove('bg-gray-950', 'text-gray-200');
                body.classList.add('bg-slate-50', 'text-gray-800');
            }
        };

        // UI HELPERS FOR DARK MODE
        const uiConfig = () => {
            const d = window.state.theme.isDark;
            return {
                bgCard: d ? 'bg-gray-900 border-gray-800' : 'bg-white border-gray-100',
                bgSecondary: d ? 'bg-gray-800 border-gray-700' : 'bg-gray-50 border-gray-200',
                textMain: d ? 'text-gray-100' : 'text-gray-800',
                textMuted: d ? 'text-gray-400' : 'text-gray-500',
                inputBg: d ? 'bg-gray-800 border-gray-700 text-gray-200 focus:ring-gray-600' : 'bg-white border-gray-200 text-gray-700 focus:ring-gray-300',
                kanbanCol: d ? 'bg-gray-800/50 border-gray-800' : 'bg-gray-50 border-gray-100',
                calEmpty: d ? 'bg-gray-900/50 border-gray-800' : 'bg-gray-50/50 border-gray-50',
                iconColor: d ? 'text-gray-500 hover:text-gray-300' : 'text-gray-400 hover:text-gray-600',
            }
        };

        window.renderApp = function() {
            if(!window.state.currentUser) return;
            document.getElementById('app').innerHTML = `
                ${renderMobileHeader()}
                ${renderDesktopSidebar()}
                ${renderMainContent()}
                ${renderMobileNav()}
            `;
            lucide.createIcons();
        };

        window.refreshTab = function() {
            if(!window.state.currentUser) return;
            const content = document.getElementById('tab-content');
            if (content) {
                if (window.state.activeTab === 'Dashboard') content.innerHTML = viewDashboard();
                else if (window.state.activeTab === 'Calendar') content.innerHTML = viewCalendar();
                else if (window.state.activeTab === 'Details') content.innerHTML = viewDetails();
                else if (window.state.activeTab === 'Settings') content.innerHTML = viewSettings();
                lucide.createIcons();
            }
        };

        window.renderModals = function() {
            const modalRoot = document.getElementById('modal-root');
            let html = '';
            if (window.state.isTaskModalOpen) html += renderUnifiedTaskModal();
            if (window.state.isProjectModalOpen) html += renderProjectSettingsModal();
            modalRoot.innerHTML = html;
            lucide.createIcons();
        };

        // ==========================================
        // 4. TELEGRAM LOGIC
        // ==========================================
        window.sendTelegramReminder = async function(isManual = false) {
            if (!window.state.telegramUsername) {
                if(isManual) alert("Mohon masukkan Username Telegram Anda di menu Settings terlebih dahulu.");
                return;
            }

            const btn = document.getElementById('btn-telegram-test');
            let originalText = '';
            if(btn && isManual) {
                originalText = btn.innerHTML;
                btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Memproses...`;
                btn.disabled = true;
            }

            try {
                // 1. CARI CHAT ID BERDASARKAN USERNAME
                let chatId = window.state.telegramChatId;
                if(isManual) { 
                    const resUpdate = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates`);
                    const dataUpdate = await resUpdate.json();
                    
                    let foundId = null;
                    const inputUsername = window.state.telegramUsername.replace('@', '').toLowerCase();

                    if (dataUpdate.ok && dataUpdate.result) {
                        for (let i = dataUpdate.result.length - 1; i >= 0; i--) {
                            const msg = dataUpdate.result[i].message;
                            if (msg && msg.from && msg.from.username && msg.from.username.toLowerCase() === inputUsername) {
                                foundId = msg.chat.id;
                                break;
                            }
                        }
                    }

                    if(foundId) {
                        chatId = foundId;
                        window.state.telegramChatId = foundId;
                        window.saveToStorage(false);
                    } else if (!chatId) {
                        alert("ERROR: Bot belum pernah menerima chat dari Anda.\n\nBuka Telegram Anda, cari Bot Anda, lalu kirim pesan apa saja (misal: 'Halo'). Setelah itu, klik tombol Test ini lagi.");
                        if(btn && isManual) { btn.innerHTML = originalText; btn.disabled = false; lucide.createIcons(); }
                        return;
                    }
                }

                if(!chatId) return;

                // 2. KUMPULKAN TASK HARI INI & PROJECT MINGGU INI
                const todayObj = new Date(TODAY);
                const nextWeekObj = new Date(todayObj);
                nextWeekObj.setDate(todayObj.getDate() + 7);
                const NEXT_WEEK_STR = nextWeekObj.getFullYear() + '-' + String(nextWeekObj.getMonth() + 1).padStart(2, '0') + '-' + String(nextWeekObj.getDate()).padStart(2, '0');
                
                const pendingTasks = window.state.tasks.filter(t => t.status !== 'Done');
                const pendingActions = window.state.projects.flatMap(p => 
                    p.actions.filter(a => a.status !== 'Done').map(a => ({...a, projectTitle: p.title}))
                );
                
                const allPending = [...pendingTasks, ...pendingActions];
                let todays = allPending.filter(i => i.date === TODAY);
                let thisWeeks = allPending.filter(i => i.date > TODAY && i.date <= NEXT_WEEK_STR);
                
                // 3. FORMAT PESAN TELEGRAM
                let message = `🔔 *nytask! Daily & Weekly Update* 🔔\n\n`;
                message += `📅 *Tanggal:* ${window.formatFullDate(TODAY)}\n`;
                message += `👤 *User:* ${window.state.userName}\n\n`;

                if (todays.length === 0 && thisWeeks.length === 0) {
                    message += `🎉 Awesome! Tidak ada tugas hari ini maupun jadwal project minggu ini. Waktunya bersantai! ☕`;
                } else {
                    // SEKSI HARI INI
                    message += `🔥 *TUGAS HARI INI (${todays.length}):*\n`;
                    if(todays.length === 0) message += `_Tidak ada deadline hari ini._\n`;
                    todays.forEach((item, index) => {
                        const prioIcon = item.priority === 'High' ? '🔴' : (item.priority === 'Medium' ? '🟡' : '🔵');
                        const projCatInfo = item.projectTitle ? `[Project: ${item.projectTitle}]` : (item.category && item.category!=='General' ? `[${item.category}]` : '');
                        message += `${index + 1}. ${prioIcon} *${item.title || item.text}*\n   ${projCatInfo} ${item.time && !item.isAllDay ? `🕒 ${item.time}` : '🕒 All Day'}\n`;
                    });

                    // SEKSI MINGGU INI
                    message += `\n📆 *PROJECT MINGGU INI (${thisWeeks.length}):*\n`;
                    if(thisWeeks.length === 0) message += `_Tidak ada agenda dalam 7 hari ke depan._\n`;
                    thisWeeks.sort((a, b) => new Date(a.date) - new Date(b.date)).forEach((item) => {
                        const prioIcon = item.priority === 'High' ? '🔴' : (item.priority === 'Medium' ? '🟡' : '🔵');
                        const projCatInfo = item.projectTitle ? `[${item.projectTitle}]` : '';
                        message += `• ${item.date} : ${prioIcon} ${item.title || item.text} ${projCatInfo}\n`;
                    });

                    message += `\n💪 Let's get them done!`;
                }

                // 4. KIRIM API
                const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: 'Markdown' })
                });

                const result = await response.json();
                
                if (result.ok) {
                    if(isManual) alert("Reminder berhasil dikirim ke Telegram Anda!");
                    if(!isManual) {
                        window.state.lastReminderSentDate = TODAY;
                        window.saveToStorage(false);
                    }
                } else {
                    if(isManual) alert("Gagal mengirim! Pastikan Anda sudah memulai chat ke Bot Anda di Telegram.");
                }

            } catch (error) {
                console.error("Telegram API Error:", error);
                if(isManual) alert("Gagal menyambung ke server Telegram. Periksa koneksi Anda.");
            } finally {
                if(btn && isManual) {
                    btn.innerHTML = originalText; btn.disabled = false; lucide.createIcons();
                }
            }
        };

        window.checkAndSendAutoReminder = function() {
            if (window.state.autoReminderEnabled && window.state.telegramChatId) {
                // If we haven't sent it today
                if (window.state.lastReminderSentDate !== TODAY) {
                    console.log("Triggering auto Telegram reminder for today...");
                    window.sendTelegramReminder(false);
                }
            }
        };


        // ==========================================
        // 5. LAYOUT & VIEWS RENDERING
        // ==========================================
        function renderMobileHeader() {
            return `
            <header class="lg:hidden ${window.state.theme.mainBg} ${window.state.theme.isDark ? 'border-b border-gray-800' : ''} text-white p-4 rounded-b-3xl flex justify-between items-center z-20 shadow-md flex-shrink-0">
                <div class="flex items-center gap-3">
                    <img src="${window.state.currentUser?.photoURL || 'https://via.placeholder.com/150'}" alt="Profile" class="w-10 h-10 rounded-full border-2 border-white/20 bg-black/20 object-cover">
                    <div>
                        <div class="flex items-center gap-1.5 h-5">
                            <img src="logo.png" alt="nytask!" class="h-4 object-contain filter invert" onerror="this.onerror=null; this.outerHTML='<span class=&quot;font-extrabold text-sm tracking-tight&quot;>nytask!</span>'">
                        </div>
                        <p class="text-[10px] mt-0.5 ${window.state.theme.accentText}">Hello, ${window.state.userName}</p>
                    </div>
                </div>
            </header>`;
        }

        function renderDesktopSidebar() {
            const ui = uiConfig();
            const navItems = TABS.map(t => `
                <button onclick="window.setActiveTab('${t.id}')" class="w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all duration-200 ${window.state.activeTab === t.id ? 'bg-white/10 font-medium shadow-sm' : 'text-white/70 hover:bg-white/5 hover:text-white'}">
                    <i data-lucide="${t.icon}" class="w-5 h-5"></i> ${t.name}
                </button>
            `).join('');

            return `
            <aside class="hidden lg:flex w-64 ${window.state.theme.mainBg} ${window.state.theme.isDark ? 'border-r border-gray-800' : ''} text-white flex-shrink-0 flex-col rounded-r-3xl z-10 h-full transition-colors duration-300">
                <div class="p-8 pb-4">
                    <div class="flex items-center gap-3 mb-10 h-8">
                        <!-- Make logo white for sidebar -->
                        <img src="logo.png" alt="nytask!" class="h-7 object-contain filter invert" onerror="this.onerror=null; this.outerHTML='<span class=&quot;font-extrabold text-2xl tracking-tight&quot;>nytask!</span>'">
                    </div>
                    <div class="flex flex-col items-center mb-6">
                        <img src="${window.state.currentUser?.photoURL || 'https://via.placeholder.com/150'}" alt="Profile" class="w-20 h-20 rounded-full border-4 border-white/20 bg-black/20 object-cover mb-4 shadow-lg">
                        <h2 class="font-semibold text-lg">${window.state.userName}</h2>
                    </div>
                </div>
                <nav class="flex-1 px-4 space-y-2">${navItems}</nav>
            </aside>`;
        }

            const navItems = TABS.map(t => `

                </button>

        // ==========================================
        // AGENDAS & VIEWS (WITH DARK MODE APPLIED)
        // ==========================================
        function viewDashboard() {
            const ui = uiConfig();
            const PRIO = getPriorityColors(window.state.theme.isDark);
            
            const todaysTasks = window.state.tasks.filter(t => t.date === TODAY);
            const todaysActions = window.state.projects.flatMap(p => p.actions.filter(a => a.date === TODAY));
            const allToday = [...todaysTasks, ...todaysActions];
            const todayDone = allToday.filter(i => i.status === 'Done').length;
            const todayNotDone = allToday.length - todayDone;
            const todayTotal = allToday.length;

            let monthComp = 0, monthToDo = 0;
            window.state.tasks.forEach(t => { const d = new Date(t.date); if (d.getMonth() === window.state.calMonth && d.getFullYear() === window.state.calYear) { t.status === 'Done' ? monthComp++ : monthToDo++; }});
            window.state.projects.forEach(p => { p.actions.forEach(a => { const d = new Date(a.date); if (d.getMonth() === window.state.calMonth && d.getFullYear() === window.state.calYear) { a.status === 'Done' ? monthComp++ : monthToDo++; }});});
            
            const monthActiveProjects = window.state.projects.filter(p => {
                const start = new Date(p.startDate), end = p.endDate ? new Date(p.endDate) : new Date(2099, 11, 31);
                const filterStart = new Date(window.state.calYear, window.state.calMonth, 1), filterEnd = new Date(window.state.calYear, window.state.calMonth + 1, 0);
                return start <= filterEnd && end >= filterStart;
            }).length;

            let years = []; for(let i=2026; i<=2030; i++) years.push(i);
            const monthOpts = MONTH_NAMES.map((m, idx) => `<option value="${idx}" ${idx === window.state.calMonth ? 'selected' : ''}>${m}</option>`).join('');
            const yearOpts = years.map(y => `<option value="${y}" ${y === window.state.calYear ? 'selected' : ''}>${y}</option>`).join('');

            let displayList = [];
            if (window.state.dashboardViewMode === 'all') {
                const aTasks = window.state.tasks.filter(t => t.date === window.state.selectedDate);
                const aActions = window.state.projects.flatMap(p => p.actions.filter(a => a.date === window.state.selectedDate).map(a => ({...a, isProjectAction: true, projectId: p.id, projectTitle: p.title})));
                displayList = [...aTasks, ...aActions];
            } else {
                const hpTasks = window.state.tasks.filter(t => t.priority === 'High' && t.status !== 'Done');
                const hpActions = window.state.projects.flatMap(p => p.actions.filter(a => a.priority === 'High' && a.status !== 'Done').map(a => ({...a, isProjectAction: true, projectId: p.id, projectTitle: p.title})));
                displayList = [...hpTasks, ...hpActions];
            }

            displayList.sort((a, b) => new Date(a.date) - new Date(b.date));

            const listHTML = displayList.length === 0 
                ? `<p class="text-sm ${ui.textMuted} italic p-4 text-center border border-dashed rounded-xl border-gray-300 dark:border-gray-700">No tasks found for this view.</p>`
                : displayList.map(item => {
                    const isDone = item.status === 'Done';
                    const proj = item.isProjectAction ? window.state.projects.find(p=>p.id === item.projectId) : window.state.projects.find(p=>p.title === item.category);
                    const catColorStr = proj ? proj.color : 'bg-gray-500';
                    const prioClasses = PRIO[item.priority || 'Medium'];
                    const doneColor = window.state.theme.isDark ? 'bg-gray-800' : 'bg-gray-200';
                    
                    return `
                    <div class="p-3 lg:p-4 rounded-xl border ${ui.bgCard} flex flex-col gap-2 transition-all relative overflow-hidden shadow-sm hover:shadow-md cursor-pointer" onclick="window.openEditTaskModal(${item.isProjectAction ? item.projectId : null}, ${item.id}, ${item.isProjectAction})">
                        <div class="absolute left-0 top-0 bottom-0 w-1 ${isDone ? doneColor : catColorStr}"></div>
                        <div class="flex justify-between items-start w-full pl-2">
                            <h4 class="font-bold text-sm lg:text-base ${isDone ? `line-through ${ui.textMuted}` : ui.textMain}">${item.title || item.text}</h4>
                            <span class="text-[9px] border px-1.5 py-0.5 rounded font-bold flex-shrink-0 ml-2 ${isDone ? `${ui.bgSecondary} ${ui.textMuted}` : prioClasses}">${item.priority || 'Medium'}</span>
                        </div>
                        <div class="pl-2 w-full flex justify-between items-end">
                             <div class="text-[10px] lg:text-xs ${ui.textMuted} font-medium">
                                ${item.isProjectAction ? `<span class="flex items-center gap-1"><i data-lucide="briefcase" class="w-3 h-3"></i> Project: ${item.projectTitle}</span>` : ''}
                                ${!item.isProjectAction && item.category && item.category !== 'General' ? `<span class="flex items-center gap-1"><i data-lucide="tag" class="w-3 h-3"></i> Category: ${item.category}</span>` : ''}
                                <span class="flex items-center gap-1 mt-0.5"><i data-lucide="calendar" class="w-3 h-3"></i> Date: ${item.date} ${item.time && !item.isAllDay ? `| ${item.time}` : ''}</span>
                             </div>
                             <span class="text-[10px] font-bold px-2 py-1 rounded ${isDone ? 'bg-green-100/20 text-green-600' : (item.status === 'In Progress' ? 'bg-blue-100/20 text-blue-600' : `${ui.bgSecondary} ${ui.textMuted}`)}">${item.status}</span>
                        </div>
                    </div>`;
                }).join('');

            return `
            <div class="space-y-6 lg:space-y-8 pb-10">
                <section>
                    <h2 class="text-xl lg:text-2xl font-bold mb-4 flex items-center gap-2 ${ui.textMain}">Today's Overview</h2>
                    <div class="grid grid-cols-3 gap-3 lg:gap-6">
                        <div class="${ui.bgCard} border p-5 lg:p-6 rounded-2xl lg:rounded-3xl shadow-sm flex flex-col justify-center items-center text-center">
                            <span class="text-3xl lg:text-5xl font-bold ${ui.textMain} mb-1">${todayTotal}</span>
                            <span class="text-xs lg:text-sm font-bold ${ui.textMuted} uppercase tracking-wider">Total Tasks</span>
                        </div>
                        <div class="${ui.bgCard} border p-5 lg:p-6 rounded-2xl lg:rounded-3xl shadow-sm flex flex-col justify-center items-center text-center">
                            <span class="text-3xl lg:text-5xl font-bold ${window.state.theme.mainText} mb-1">${todayDone}</span>
                            <span class="text-xs lg:text-sm font-bold ${ui.textMuted} uppercase tracking-wider">Done</span>
                        </div>
                        <div class="${ui.bgCard} border p-5 lg:p-6 rounded-2xl lg:rounded-3xl shadow-sm flex flex-col justify-center items-center text-center border-b-4 border-b-orange-500">
                            <span class="text-3xl lg:text-5xl font-bold text-orange-500 mb-1">${todayNotDone}</span>
                            <span class="text-xs lg:text-sm font-bold ${ui.textMuted} uppercase tracking-wider">To Do</span>
                        </div>
                    </div>
                </section>

                <section class="${ui.bgCard} border rounded-2xl lg:rounded-3xl shadow-sm p-4 lg:p-6 transition-all">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                        <div class="flex items-center gap-2 cursor-pointer" onclick="window.toggleMonthSummary()">
                            <h2 class="text-base lg:text-lg font-bold ${ui.textMain}">Month Overview</h2>
                            <i data-lucide="${window.state.showMonthSummary ? 'chevron-up' : 'chevron-down'}" class="w-5 h-5 ${ui.textMuted}"></i>
                        </div>
                        <div class="flex gap-2 ${window.state.showMonthSummary ? '' : 'hidden'}">
                            <select onchange="window.changeSummaryDate('month', this.value)" class="appearance-none ${ui.inputBg} py-1.5 px-3 rounded-lg border text-xs font-medium cursor-pointer outline-none">${monthOpts}</select>
                            <select onchange="window.changeSummaryDate('year', this.value)" class="appearance-none ${ui.inputBg} py-1.5 px-3 rounded-lg border text-xs font-medium cursor-pointer outline-none">${yearOpts}</select>
                        </div>
                    </div>
                    
                    <div class="grid-cols-3 gap-3 lg:gap-4 mt-4 ${window.state.showMonthSummary ? 'grid' : 'hidden'}">
                        <div class="${ui.bgSecondary} border p-3 lg:p-4 rounded-xl flex flex-col justify-center items-center">
                            <span class="text-xl lg:text-2xl font-bold ${ui.textMain} mb-1">${monthComp}</span>
                            <span class="text-[10px] lg:text-xs font-medium ${ui.textMuted}">Completed</span>
                        </div>
                        <div class="${ui.bgSecondary} border p-3 lg:p-4 rounded-xl flex flex-col justify-center items-center">
                            <span class="text-xl lg:text-2xl font-bold ${ui.textMain} mb-1">${monthToDo}</span>
                            <span class="text-[10px] lg:text-xs font-medium ${ui.textMuted}">Pending</span>
                        </div>
                        <div class="${ui.bgSecondary} border p-3 lg:p-4 rounded-xl flex flex-col justify-center items-center">
                            <span class="text-xl lg:text-2xl font-bold ${ui.textMain} mb-1">${monthActiveProjects}</span>
                            <span class="text-[10px] lg:text-xs font-medium ${ui.textMuted}">Active Projects</span>
                        </div>
                    </div>
                </section>
                
                <section>
                    <div class="flex items-center gap-2 mb-4 border-b ${window.state.theme.isDark ? 'border-gray-800' : 'border-gray-200'}">
                        <button onclick="window.setDashboardView('all')" class="px-4 py-2 text-sm font-bold transition-all border-b-2 ${window.state.dashboardViewMode === 'all' ? `${window.state.theme.mainBorder} ${window.state.theme.mainText}` : `border-transparent ${ui.textMuted} hover:${ui.textMain}`}">All Tasks (${window.state.selectedDate})</button>
                        <button onclick="window.setDashboardView('high')" class="px-4 py-2 text-sm font-bold transition-all border-b-2 flex items-center gap-1 ${window.state.dashboardViewMode === 'high' ? `border-red-500 text-red-500` : `border-transparent ${ui.textMuted} hover:${ui.textMain}`}"><i data-lucide="flame" class="w-4 h-4"></i> High Priority</button>
                    </div>
                    <div class="space-y-3 lg:space-y-4">
                        ${listHTML}
                    </div>
                </section>
            </div>`;
        }

        function viewCalendar() {
            const ui = uiConfig();
            const PRIO = getPriorityColors(window.state.theme.isDark);
            
            const daysInMonth = new Date(window.state.calYear, window.state.calMonth + 1, 0).getDate();
            const startDay = new Date(window.state.calYear, window.state.calMonth, 1).getDay();
            
            let calDaysHTML = '';
            for(let i = 0; i < startDay; i++) calDaysHTML += `<div class="min-h-[60px] lg:min-h-[100px] border rounded-lg lg:rounded-xl p-1 lg:p-2 ${ui.calEmpty}"></div>`;
            
            for(let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${window.state.calYear}-${String(window.state.calMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isSelected = window.state.selectedDate === dateStr;
                const isToday = dateStr === TODAY;
                
                const dayTasks = window.state.tasks.filter(t => t.date === dateStr);
                const activeProjects = window.state.projects.filter(p => dateStr >= p.startDate && (!p.endDate || dateStr <= p.endDate));

                let projBlocks = activeProjects.map(p => {
                    const color = p.color || 'bg-gray-500';
                    return `<div class="${color} text-transparent sm:text-white text-[8px] sm:text-[10px] px-0.5 sm:px-1.5 py-0.5 sm:truncate font-medium shadow-sm mb-[1px] h-1.5 sm:h-auto"><span class="hidden sm:inline">${p.title}</span></div>`;
                }).join('');

                let taskDots = dayTasks.map(t => {
                    const proj = window.state.projects.find(p=>p.title === t.category);
                    const color = proj ? proj.color : 'bg-gray-500';
                    return `<div class="flex items-center gap-1 overflow-hidden"><div class="w-1 lg:w-1.5 h-1 lg:h-1.5 rounded-full flex-shrink-0 ${color}"></div><span class="text-[8px] lg:text-[10px] font-medium truncate hidden sm:inline ${t.status === 'Done' ? `line-through ${ui.textMuted}` : ui.textMain}">${t.title}</span></div>`;
                }).join('');

                const selClass = isSelected ? `${window.state.theme.mainBorder} shadow-md ${window.state.theme.isDark ? 'bg-gray-800' : window.state.theme.lightBg}` : `${ui.bgCard} hover:${ui.bgSecondary}`;
                const numClass = isToday ? 'bg-orange-500 text-white' : (isSelected ? `${window.state.theme.mainBg} text-white` : ui.textMuted);

                calDaysHTML += `
                <div onclick="window.selectDate('${dateStr}')" class="min-h-[60px] lg:min-h-[110px] border rounded-lg lg:rounded-xl relative transition cursor-pointer flex flex-col overflow-hidden ${selClass}">
                    <div class="w-full flex flex-col mb-0.5 lg:mb-1">${projBlocks}</div>
                    <div class="px-1 lg:px-2 pb-1 lg:pb-2 flex-1 flex flex-col">
                        <div class="flex justify-between items-center mb-0.5 lg:mb-1">
                            <span class="text-[10px] lg:text-sm font-bold w-5 h-5 lg:w-6 lg:h-6 flex items-center justify-center rounded-full ${numClass}">${day}</span>
                        </div>
                        <div class="flex-1 overflow-hidden space-y-0.5 lg:space-y-1 mt-0.5 lg:mt-1">${taskDots}</div>
                    </div>
                </div>`;
            }

            let aTasks = window.state.tasks.filter(t => t.date === window.state.selectedDate);
            let aActions = window.state.projects.flatMap(p => p.actions.filter(a => a.date === window.state.selectedDate).map(a => ({...a, isProjectAction: true, projectId: p.id, projectTitle: p.title})));
            let agendaCombined = [...aTasks, ...aActions];
            agendaCombined.sort((a, b) => new Date(a.date) - new Date(b.date));

            const STATUSES = ['To Do', 'In Progress', 'Done'];
            
            const agendaHTML = agendaCombined.length === 0 
                ? `<p class="text-xs lg:text-sm ${ui.textMuted} italic border border-dashed border-gray-300 dark:border-gray-700 p-4 rounded-xl text-center">No schedule for this date.</p>`
                : agendaCombined.map(item => {
                    const isDone = item.status === 'Done';
                    const proj = item.isProjectAction ? window.state.projects.find(p=>p.id === item.projectId) : window.state.projects.find(p=>p.title === item.category);
                    const catColorStr = proj ? proj.color : 'bg-gray-500';
                    const prioClasses = PRIO[item.priority || 'Medium'];
                    const selectOptions = STATUSES.map(s => `<option value="${s}" ${item.status === s ? 'selected' : ''}>${s}</option>`).join('');

                    return `
                    <div class="p-3 lg:p-4 rounded-xl lg:rounded-2xl border flex items-center gap-3 lg:gap-4 transition-all relative overflow-hidden ${isDone ? `${ui.bgSecondary} opacity-70` : ui.bgCard} shadow-sm">
                        <div class="absolute left-0 top-0 bottom-0 w-1 ${catColorStr}"></div>
                        <div class="flex-1 overflow-hidden cursor-pointer" onclick="window.openEditTaskModal(${item.isProjectAction ? item.projectId : null}, ${item.id}, ${item.isProjectAction})">
                            <div class="flex justify-between items-start mb-1">
                                <h4 class="font-bold text-sm lg:text-base truncate ${isDone ? `line-through ${ui.textMuted}` : ui.textMain}">${item.title || item.text}</h4>
                                <span class="text-[9px] border px-1.5 py-0.5 rounded font-bold flex-shrink-0 ml-2 ${isDone ? `${ui.bgSecondary} ${ui.textMuted}` : prioClasses}">${item.priority || 'Medium'}</span>
                            </div>
                            <div class="text-[10px] lg:text-xs ${ui.textMuted} flex gap-3 truncate">
                                ${item.time && !item.isAllDay ? `<span class="flex items-center gap-1 flex-shrink-0"><i data-lucide="clock" class="w-3 h-3"></i> ${item.time}</span>` : ''}
                                ${item.isProjectAction ? `<span class="flex items-center gap-1"><i data-lucide="briefcase" class="w-3 h-3"></i> ${item.projectTitle}</span>` : ''}
                            </div>
                        </div>
                        <select onchange="window.updateItemStatus(${item.isProjectAction ? item.projectId : null}, ${item.id}, ${item.isProjectAction}, this.value)" class="text-[10px] lg:text-xs font-bold px-2 py-1.5 rounded outline-none border focus:ring-1 focus:ring-gray-400 cursor-pointer ${isDone ? 'bg-green-100/20 text-green-600 border-green-200/20' : (item.status==='In Progress' ? 'bg-blue-100/20 text-blue-600 border-blue-200/20' : ui.inputBg)}">
                            ${selectOptions}
                        </select>
                    </div>`;
                }).join('');

            return `
            <div class="flex flex-col gap-6 lg:gap-8 h-full">
                <!-- Calendar Grid -->
                <div class="${ui.bgCard} p-4 lg:p-6 rounded-2xl lg:rounded-3xl shadow-sm border overflow-x-auto">
                    <div class="flex justify-between items-center mb-4 lg:mb-6 min-w-[300px]">
                        <h2 class="text-xl lg:text-2xl font-bold ${ui.textMain}">${MONTH_NAMES[window.state.calMonth]} ${window.state.calYear}</h2>
                        <div class="flex gap-2">
                            <button onclick="window.changeMonth(-1)" class="p-1.5 lg:p-2 border rounded-lg ${ui.inputBg} hover:${ui.bgSecondary} disabled:opacity-50"><i data-lucide="chevron-left" class="w-4 h-4 lg:w-5 lg:h-5 ${ui.textMuted}"></i></button>
                            <button onclick="window.changeMonth(1)" class="p-1.5 lg:p-2 border rounded-lg ${ui.inputBg} hover:${ui.bgSecondary} disabled:opacity-50"><i data-lucide="chevron-right" class="w-4 h-4 lg:w-5 lg:h-5 ${ui.textMuted}"></i></button>
                        </div>
                    </div>
                    <div class="grid grid-cols-7 gap-1 lg:gap-2 mb-1 lg:mb-2 min-w-[300px]">
                        ${['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => `<div class="text-center text-[10px] lg:text-sm font-semibold ${ui.textMuted} py-1 lg:py-2">${window.innerWidth < 640 ? d.charAt(0) : d}</div>`).join('')}
                    </div>
                    <div class="grid grid-cols-7 gap-1 lg:gap-2 min-w-[300px]">${calDaysHTML}</div>
                </div>
                <!-- Agenda Schedule -->
                <div class="${ui.bgCard} p-4 lg:p-6 rounded-2xl lg:rounded-3xl shadow-sm border flex-1">
                    <h2 class="text-lg lg:text-xl font-bold mb-4 lg:mb-6 flex items-center gap-2 ${ui.textMain}">
                        <i data-lucide="clock" class="w-5 h-5 lg:w-6 lg:h-6 ${window.state.theme.mainText}"></i>
                        Schedule <span class="text-xs lg:text-sm font-normal ${ui.textMuted}">(${window.formatFullDate(window.state.selectedDate)})</span>
                    </h2>
                    <div class="space-y-3 lg:space-y-4">
                        ${agendaHTML}
                    </div>
                </div>
            </div>`;
        }

        function viewDetails() {
            const ui = uiConfig();
            const PRIO = getPriorityColors(window.state.theme.isDark);

            const projectsHTML = window.state.projects.map(project => {
                const catColor = project.color || 'bg-gray-500';
                const KANBAN_COLS = ['To Do', 'In Progress', 'Done'];
                
                const boardHTML = KANBAN_COLS.map(status => {
                    const colActions = project.actions.filter(a => a.status === status);
                    colActions.sort((a,b) => {
                       const pA = PRIORITY_SCORES[a.priority || 'Medium']; const pB = PRIORITY_SCORES[b.priority || 'Medium'];
                       if(pA !== pB) return pB - pA; return new Date(a.date) - new Date(b.date);
                    });
                    
                    const cardsHTML = colActions.map(action => {
                        const isDeadlineToday = action.date === TODAY && status !== 'Done';
                        const isOverdue = action.date < TODAY && status !== 'Done';
                        const dateClass = isDeadlineToday ? 'text-red-500 font-bold' : (isOverdue ? 'text-red-700 font-bold' : ui.textMuted);
                        const prioClasses = PRIO[action.priority || 'Medium'];
                        
                        return `
                        <div draggable="true" ondragstart="window.dragStart(event, ${project.id}, ${action.id})" onclick="window.openEditTaskModal(${project.id}, ${action.id}, true)" class="kanban-card ${ui.bgCard} p-3 rounded-xl shadow-sm border hover:shadow-md transition group relative mb-3">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[10px] border px-1.5 py-0.5 rounded font-bold ${status === 'Done' ? `${ui.bgSecondary} ${ui.textMuted}` : prioClasses}">${action.priority || 'Medium'}</span>
                                <span class="text-[10px] ${dateClass}">${action.date}</span>
                            </div>
                            <h5 class="text-sm font-bold leading-tight ${status === 'Done' ? `line-through ${ui.textMuted}` : ui.textMain}">${action.text}</h5>
                            ${action.details ? `<p class="text-xs ${ui.textMuted} mt-2 line-clamp-2">${action.details}</p>` : ''}
                        </div>`;
                    }).join('');

        // ==========================================
        // 7. EVENT HANDLERS & LOGIC
        // ==========================================
        window.setActiveTab = (tabId) => { window.state.activeTab = tabId; window.renderApp(); window.refreshTab(); };
        window.saveSettingsName = () => { window.state.userName = document.getElementById('settings-username').value; window.saveToStorage(true); };
        window.changeTheme = (themeId) => { window.state.theme = THEMES.find(t => t.id === themeId); window.saveToStorage(true); };
        window.handleSearch = (val) => { window.state.searchQuery = val; window.refreshTab(); };
        
        window.changeSummaryMonth = (val) => { window.state.calMonth = parseInt(val); window.refreshTab(); };
        window.changeSummaryDate = (type, val) => {
            if(type === 'month') window.state.calMonth = parseInt(val);
            else if(type === 'year') window.state.calYear = parseInt(val);
            window.refreshTab();
        };

        window.toggleMonthSummary = () => { window.state.showMonthSummary = !window.state.showMonthSummary; window.refreshTab(); };
        window.setDashboardView = (mode) => { window.state.dashboardViewMode = mode; window.refreshTab(); };

        window.changeMonth = (offset) => {
            let newM = window.state.calMonth + offset; let newY = window.state.calYear;
            if (newM > 11) { newM = 0; newY++; } else if (newM < 0) { newM = 11; newY--; }
            if (newY < 2026 || (newY === 2026 && newM < 5) || newY > 2030) return;
            window.state.calMonth = newM; window.state.calYear = newY; window.refreshTab();
        };
        window.selectDate = (dateStr) => { window.state.selectedDate = dateStr; window.refreshTab(); };

        window.toggleProjectCollapse = (id) => {
            window.state.projects = window.state.projects.map(p => p.id === id ? {...p, isCollapsed: !p.isCollapsed} : p);
            window.saveToStorage(false); window.refreshTab();
        };

        window.updateItemStatus = (projectId, taskId, isAction, newStatus) => {
            if (isAction) {
                window.state.projects = window.state.projects.map(p => {
                    if (p.id === projectId) {
                        p.actions = p.actions.map(a => a.id === taskId ? { ...a, status: newStatus, isCompleted: newStatus === 'Done' } : a);
                        const comp = p.actions.filter(a => a.status === 'Done').length; p.progress = p.actions.length === 0 ? 0 : Math.round((comp / p.actions.length) * 100);
                    } return p;
                });
            } else {
                window.state.tasks = window.state.tasks.map(t => t.id === taskId ? { ...t, status: newStatus, done: newStatus === 'Done' } : t);
            }
            window.saveToStorage(false); window.refreshTab();
        };

        window.dragStart = (e, pId, aId) => { e.dataTransfer.setData('text/plain', JSON.stringify({ pId, aId })); };
        window.allowDrop = (e) => { e.preventDefault(); };
        window.dropCard = (e, targetPId, newStatus) => {
            e.preventDefault(); const dataStr = e.dataTransfer.getData('text/plain'); if(!dataStr) return; const data = JSON.parse(dataStr);
            if(data.pId === targetPId) {
                window.state.projects = window.state.projects.map(p => {
                    if (p.id === targetPId) {
                        p.actions = p.actions.map(a => a.id === data.aId ? { ...a, status: newStatus, isCompleted: newStatus === 'Done' } : a);
                        const comp = p.actions.filter(a => a.status === 'Done').length; p.progress = p.actions.length === 0 ? 0 : Math.round((comp / p.actions.length) * 100);
                    } return p;
                });
                window.saveToStorage(false); window.refreshTab();
            }
        };

        window.openCreateTaskModal = (prefillProjectId = '') => { 
            window.state.taskModalData = { id: null, title: '', projectId: prefillProjectId, status: 'To Do', priority: 'Medium', date: TODAY, time: '', isAllDay: false, details: '', category: '', isEdit: false }; 
            window.state.isTaskModalOpen = true; window.renderModals(); 
        };
        window.openEditTaskModal = (projectId, taskId, isAction) => {
            if (isAction) {
                const proj = window.state.projects.find(p => p.id === projectId); const act = proj.actions.find(a => a.id === taskId);
                window.state.taskModalData = { id: act.id, title: act.text, projectId: proj.id, status: act.status, priority: act.priority, date: act.date, time: '', isAllDay: false, details: act.details || '', category: proj.title, isEdit: true };
            } else window.state.taskModalData = { ...window.state.tasks.find(t => t.id === taskId), projectId: '', isEdit: true };
            window.state.isTaskModalOpen = true; window.renderModals();
        };
        window.closeTaskModal = () => { window.state.isTaskModalOpen = false; window.renderModals(); };
        
        window.toggleDOMAllDay = (checked) => {
            window.state.taskModalData.isAllDay = checked;
            const timeInput = document.getElementById('utm-time');
            if (!timeInput) return;
            if(checked) {
                timeInput.disabled = true;
                timeInput.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                timeInput.disabled = false;
                timeInput.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        };

        window.saveUnifiedTask = () => {
            const d = window.state.taskModalData; const title = document.getElementById('utm-title').value; if (!title) return;
            const projId = document.getElementById('utm-project').value, status = document.getElementById('utm-status').value, priority = document.getElementById('utm-priority').value, date = document.getElementById('utm-date').value, details = document.getElementById('utm-details').value;
            
            const isAllDay = d.isAllDay;
            const timeEl = document.getElementById('utm-time'); const time = isAllDay ? '' : (timeEl ? timeEl.value : '');
            const isDone = status === 'Done';
            
            const projObj = projId ? window.state.projects.find(p => p.id === parseInt(projId)) : null;
            const categoryName = projObj ? projObj.title : 'General';

            if (d.isEdit) {
                if (d.projectId) {
                    window.state.projects = window.state.projects.map(p => {
                        if (p.id === d.projectId) {
                            p.actions = p.actions.map(a => a.id === d.id ? { ...a, text: title, date, priority, status, details, isCompleted: isDone } : a);
                            const comp = p.actions.filter(a => a.status === 'Done').length; p.progress = Math.round((comp / p.actions.length) * 100);
                        } return p;
                    });
                } else window.state.tasks = window.state.tasks.map(t => t.id === d.id ? { ...t, title, date, time, isAllDay, priority, status, details, category: categoryName, done: isDone } : t);
            } else {
                if (projId) {
                    window.state.projects = window.state.projects.map(p => {
                        if (p.id === parseInt(projId)) {
                            p.actions.push({ id: Date.now(), text: title, date, priority, status, details, isCompleted: isDone });
                            const comp = p.actions.filter(a => a.status === 'Done').length; p.progress = Math.round((comp / p.actions.length) * 100);
                        } return p;
                    });
                } else window.state.tasks.push({ id: Date.now(), title, date, time, priority, status, details, category: categoryName, done: isDone, isAllDay });
            }
            window.state.isTaskModalOpen = false; window.saveToStorage(false); window.renderModals(); window.refreshTab();
        };

        window.deleteUnifiedTask = () => {
            const d = window.state.taskModalData;
            if (d.projectId) {
                window.state.projects = window.state.projects.map(p => {
                    if (p.id === d.projectId) {
                        p.actions = p.actions.filter(a => a.id !== d.id);
                        const comp = p.actions.filter(a => a.status === 'Done').length; p.progress = p.actions.length === 0 ? 0 : Math.round((comp / p.actions.length) * 100);
                    } return p;
                });
            } else window.state.tasks = window.state.tasks.filter(t => t.id !== d.id);
            window.state.isTaskModalOpen = false; window.saveToStorage(false); window.renderModals(); window.refreshTab();
        };

        window.openCreateProjectModal = () => { window.state.projectForm = { id: null, title: '', startDate: TODAY, endDate: '', color: TAILWIND_COLORS[0] }; window.state.isEditingProject = false; window.state.isProjectModalOpen = true; window.renderModals(); };
        window.openProjectSettings = (id) => { const proj = window.state.projects.find(p => p.id === id); window.state.projectForm = { id: proj.id, title: proj.title, startDate: proj.startDate, endDate: proj.endDate, color: proj.color || TAILWIND_COLORS[0] }; window.state.isEditingProject = true; window.state.isProjectModalOpen = true; window.renderModals(); };
        window.closeProjectModal = () => { window.state.isProjectModalOpen = false; window.state.isEditingProject = false; window.renderModals(); };
        
        window.setProjectColorDOM = (color) => {
            window.state.projectForm.color = color;
            const dark = window.state.theme.isDark;
            document.querySelectorAll('.color-btn').forEach(btn => {
                btn.classList.remove('ring-2', 'ring-offset-2', 'ring-offset-gray-900', 'ring-white', 'ring-gray-800');
                if(btn.dataset.color === color) {
                    if(dark) btn.classList.add('ring-2', 'ring-offset-2', 'ring-offset-gray-900', 'ring-white');
                    else btn.classList.add('ring-2', 'ring-offset-2', 'ring-gray-800');
                }
            });
        };

        window.saveProject = () => {
            const title = document.getElementById('pf-title').value; if (!title) return;
            const startDate = document.getElementById('pf-start').value, endDate = document.getElementById('pf-end').value;
            const color = window.state.projectForm.color;
            if (window.state.isEditingProject) window.state.projects = window.state.projects.map(p => p.id === window.state.projectForm.id ? { ...p, title, startDate, endDate, color } : p);
            else window.state.projects.push({ id: Date.now(), title, startDate, endDate, color, isCollapsed: false, progress: 0, actions: [] });
            window.state.isProjectModalOpen = false; window.state.isEditingProject = false; window.saveToStorage(false); window.renderModals(); window.refreshTab();
        };
        
        window.deleteProject = () => { window.state.projects = window.state.projects.filter(p => p.id !== window.state.projectForm.id); window.state.isProjectModalOpen = false; window.saveToStorage(false); window.renderModals(); window.refreshTab(); };

        // Save Telegram Settings explicitly
        window.saveTelegramSettings = () => {
            const username = document.getElementById('settings-telegram-username').value.trim();
            const auto = document.getElementById('settings-telegram-auto').checked;
            window.state.telegramUsername = username.replace('@', ''); // Otomatis hapus @ jika tertulis
            window.state.autoReminderEnabled = auto;
            window.saveToStorage(false);
            
            // Langsung otomatis trigger Test Send untuk mencari Chat ID barunya
            window.sendTelegramReminder(true);
        };

    </script>
</body>
</html>
