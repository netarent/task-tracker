<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Hide scrollbar for clean UI */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        /* Safe padding for mobile devices */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    </style>
</head>
<body class="bg-slate-50 font-sans overflow-hidden text-gray-800">
    
    <!-- Main App Wrapper -->
    <div id="app" class="flex flex-col lg:flex-row h-screen w-full"></div>
    
    <!-- Modals Wrapper -->
    <div id="modal-root"></div>

    <script>
        // ==========================================
        // 1. CONSTANTS & CONFIGURATION
        // ==========================================
        const TODAY = '2026-06-11'; // Current system date
        const TAILWIND_COLORS = [
            'bg-red-500', 'bg-orange-500', 'bg-amber-500', 
            'bg-green-500', 'bg-teal-500', 'bg-blue-500', 
            'bg-indigo-500', 'bg-purple-500', 'bg-pink-500'
        ];
        
        const MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

        const THEMES = [
            { id: 'teal', name: 'Teal (Default)', mainBg: 'bg-[#285c54]', mainText: 'text-[#285c54]', mainBorder: 'border-[#285c54]', hoverBg: 'hover:bg-[#1e4740]', lightBg: 'bg-[#eef7f5]', accentText: 'text-[#a7d3cb]' },
            { id: 'blue', name: 'Ocean Blue', mainBg: 'bg-blue-700', mainText: 'text-blue-700', mainBorder: 'border-blue-700', hoverBg: 'hover:bg-blue-800', lightBg: 'bg-blue-50', accentText: 'text-blue-200' },
            { id: 'purple', name: 'Royal Purple', mainBg: 'bg-purple-700', mainText: 'text-purple-700', mainBorder: 'border-purple-700', hoverBg: 'hover:bg-purple-800', lightBg: 'bg-purple-50', accentText: 'text-purple-200' }
        ];

        const TABS = [
            { id: 'Dashboard', name: 'Dashboard', icon: 'home' },
            { id: 'My Tasks', name: 'My Tasks', icon: 'calendar' },
            { id: 'Projects', name: 'Projects', icon: 'briefcase' },
            { id: 'Settings', name: 'Settings', icon: 'settings' }
        ];

        // Generate Month Options (2026 - 2030)
        let monthOptions = [];
        for(let y = 2026; y <= 2030; y++) {
            let startM = (y === 2026) ? 5 : 0; // Starts from June 2026
            for(let m = startM; m < 12; m++) monthOptions.push({ label: `${MONTH_NAMES[m]} ${y}`, m, y });
        }

        // ==========================================
        // 2. STATE MANAGEMENT & LOCAL STORAGE
        // ==========================================
        window.state = {
            activeTab: 'Dashboard',
            userName: 'Tata',
            theme: THEMES[0],
            searchQuery: '',
            
            // Data
            categories: [
                { name: 'Audit', color: 'bg-purple-500' },
                { name: 'Content', color: 'bg-orange-500' }
            ],
            tasks: [
                { id: 1, title: 'Review Marketing Copy', category: 'Content', done: true, date: TODAY, time: '10:00', isAllDay: false, details: 'Review all copy.' }
            ],
            projects: [
                {
                    id: 1, title: 'United Tractors', startDate: '2026-06-06', endDate: '2026-08-06', category: 'Audit', progress: 33,
                    actions: [
                        { id: 101, text: 'Compile asset inventory', date: '2026-06-09', isCompleted: true },
                        { id: 102, text: 'Review visual identity', date: TODAY, isCompleted: false },
                        { id: 103, text: 'Draft presentation', date: '2026-06-15', isCompleted: false }
                    ]
                }
            ],
            
            // UI States
            calMonth: 5, calYear: 2026, selectedDate: TODAY,
            isTaskModalOpen: false, isProjectModalOpen: false, isEditingProject: false,
            
            // Forms
            taskForm: { title: '', date: TODAY, endDate: '', time: '', isAllDay: false, details: '', category: '', projectId: '' },
            projectForm: { id: null, title: '', startDate: TODAY, endDate: '', category: '', actions: [] },
            newCategoryInput: '', newCategoryColor: TAILWIND_COLORS[0],
            editingAction: null, newInlineAction: { projectId: null, text: '', date: TODAY }
        };

        function loadFromStorage() {
            try {
                const saved = localStorage.getItem('taskTrackerData');
                if (saved) {
                    const data = JSON.parse(saved);
                    window.state.userName = data.userName || window.state.userName;
                    window.state.theme = data.theme || window.state.theme;
                    window.state.categories = data.categories || window.state.categories;
                    window.state.tasks = data.tasks || window.state.tasks;
                    window.state.projects = data.projects || window.state.projects;
                }
            } catch (e) { console.error("Error loading data:", e); }
        }

        window.saveToStorage = function() {
            const dataToSave = {
                userName: window.state.userName,
                theme: window.state.theme,
                categories: window.state.categories,
                tasks: window.state.tasks,
                projects: window.state.projects
            };
            localStorage.setItem('taskTrackerData', JSON.stringify(dataToSave));
        };

        // ==========================================
        // 3. CORE RENDERING ENGINE
        // ==========================================
        function renderApp() {
            document.getElementById('app').innerHTML = `
                ${renderMobileHeader()}
                ${renderDesktopSidebar()}
                ${renderMainContent()}
                ${renderMobileNav()}
            `;
            lucide.createIcons();
        }

        function refreshTab() {
            const content = document.getElementById('tab-content');
            if (content) {
                if (window.state.activeTab === 'Dashboard') content.innerHTML = viewDashboard();
                else if (window.state.activeTab === 'My Tasks') content.innerHTML = viewMyTasks();
                else if (window.state.activeTab === 'Projects') content.innerHTML = viewProjects();
                else if (window.state.activeTab === 'Settings') content.innerHTML = viewSettings();
                lucide.createIcons();
            }
        }

        function renderModals() {
            const modalRoot = document.getElementById('modal-root');
            let html = '';
            if (window.state.isTaskModalOpen) html += renderTaskModal();
            if (window.state.isProjectModalOpen) html += renderProjectModal();
            modalRoot.innerHTML = html;
            lucide.createIcons();
        }

        // ==========================================
        // 4. LAYOUT COMPONENTS
        // ==========================================
        function renderMobileHeader() {
            return `
            <header class="lg:hidden ${window.state.theme.mainBg} text-white p-4 rounded-b-3xl flex justify-between items-center z-20 shadow-md flex-shrink-0">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full border-2 border-white/20 bg-black/20 flex items-center justify-center">
                        <span class="font-bold text-lg uppercase">${window.state.userName.charAt(0)}</span>
                    </div>
                    <div>
                        <h1 class="font-bold text-lg leading-tight tracking-wide flex items-center gap-1">
                            <i data-lucide="check-square" class="w-4 h-4 opacity-80"></i> Tracker
                        </h1>
                        <p class="text-[10px] ${window.state.theme.accentText}">Hello, ${window.state.userName}</p>
                    </div>
                </div>
            </header>`;
        }

        function renderDesktopSidebar() {
            const navItems = TABS.map(t => `
                <button onclick="window.setActiveTab('${t.id}')" class="w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all duration-200 ${window.state.activeTab === t.id ? 'bg-white/10 font-medium shadow-sm' : 'text-white/70 hover:bg-white/5 hover:text-white'}">
                    <i data-lucide="${t.icon}" class="w-5 h-5"></i> ${t.name}
                </button>
            `).join('');

            return `
            <aside class="hidden lg:flex w-64 ${window.state.theme.mainBg} text-white flex-shrink-0 flex-col rounded-r-3xl z-10 h-full transition-colors duration-300">
                <div class="p-8 pb-4">
                    <div class="flex items-center gap-2 mb-10 font-bold text-xl tracking-wide">
                        <i data-lucide="check-square" class="w-6 h-6 ${window.state.theme.accentText}"></i> Tracker
                    </div>
                    <div class="flex flex-col items-center mb-6">
                        <div class="w-20 h-20 rounded-full border-4 border-white/20 bg-black/20 flex items-center justify-center mb-4 shadow-lg">
                            <span class="text-3xl font-bold uppercase">${window.state.userName.charAt(0)}</span>
                        </div>
                        <h2 class="font-semibold text-lg">${window.state.userName}</h2>
                    </div>
                </div>
                <nav class="flex-1 px-4 space-y-2">${navItems}</nav>
            </aside>`;
        }

        function renderMobileNav() {
            const navItems = TABS.map(t => `
                <button onclick="window.setActiveTab('${t.id}')" class="flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors ${window.state.activeTab === t.id ? window.state.theme.mainText : 'text-gray-400'}">
                    <i data-lucide="${t.icon}" class="w-5 h-5 ${window.state.activeTab === t.id ? 'fill-current opacity-20' : ''}"></i>
                    <span class="text-[9px] font-bold">${t.name}</span>
                </button>
            `).join('');

            return `<div class="lg:hidden fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 z-40 flex justify-around items-center h-16 pb-safe shadow-lg">${navItems}</div>`;
        }

        function renderMainContent() {
            const title = window.state.activeTab === 'Dashboard' ? `Hello, ${window.state.userName}` : TABS.find(t=>t.id === window.state.activeTab).name;
            
            return `
            <main class="flex-1 p-4 lg:p-10 pb-28 lg:pb-10 overflow-y-auto scrollbar-hide flex flex-col relative">
                <!-- Desktop Header -->
                <header class="hidden lg:flex flex-col md:flex-row md:items-center justify-between mb-10 gap-4 flex-shrink-0">
                    <div>
                        <h1 class="text-3xl font-bold tracking-tight">${title}</h1>
                        <p class="text-gray-500 mt-1">Today is ${TODAY}</p>
                    </div>
                    <div class="flex items-center gap-4 w-full md:w-auto">
                        <div class="relative w-full md:w-64">
                            <i data-lucide="search" class="w-5 h-5 absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="text" oninput="window.handleSearch(this.value)" value="${window.state.searchQuery}" placeholder="Search tasks..." class="pl-10 pr-4 py-2.5 bg-white rounded-full text-sm border-none shadow-sm focus:outline-none focus:ring-2 focus:ring-gray-200 w-full" />
                        </div>
                    </div>
                </header>

                <!-- Mobile Header -->
                <div class="lg:hidden mb-4 space-y-4">
                    <div class="relative">
                        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="text" oninput="window.handleSearch(this.value)" value="${window.state.searchQuery}" placeholder="Search tasks..." class="pl-9 pr-4 py-2 bg-white rounded-full text-xs border border-gray-100 shadow-sm focus:outline-none w-full" />
                    </div>
                    <div class="flex justify-between items-end">
                        <h1 class="text-xl font-bold tracking-tight">${window.state.activeTab === 'Dashboard' ? 'Overview' : title}</h1>
                        <p class="text-xs text-gray-500">${TODAY}</p>
                    </div>
                </div>

                <!-- Tab Content Router -->
                <div class="flex-1 max-w-6xl w-full mx-auto" id="tab-content">
                    ${window.state.activeTab === 'Dashboard' ? viewDashboard() : ''}
                    ${window.state.activeTab === 'My Tasks' ? viewMyTasks() : ''}
                    ${window.state.activeTab === 'Projects' ? viewProjects() : ''}
                    ${window.state.activeTab === 'Settings' ? viewSettings() : ''}
                </div>

                <!-- Global Add Task Button -->
                <button onclick="window.openTaskModal()" class="fixed bottom-20 right-4 lg:bottom-10 lg:right-10 w-14 h-14 lg:w-16 lg:h-16 bg-gray-900 text-white rounded-full flex items-center justify-center shadow-xl ${window.state.theme.hoverBg} hover:scale-105 transition-all z-30 group" title="Add New Task">
                    <i data-lucide="plus" class="w-6 h-6 lg:w-8 lg:h-8 group-hover:rotate-90 transition-transform duration-300"></i>
                </button>
            </main>`;
        }

        // ==========================================
        // 5. TAB VIEWS
        // ==========================================
        function getAgendaData() {
            let combined = [];
            if (window.state.searchQuery.trim() !== '') {
                const q = window.state.searchQuery.toLowerCase();
                const mTasks = window.state.tasks.filter(t => t.title.toLowerCase().includes(q) || (t.details && t.details.toLowerCase().includes(q)));
                const mActions = window.state.projects.flatMap(p => p.actions.filter(a => a.text.toLowerCase().includes(q)).map(a => ({...a, isProjectAction: true, projectId: p.id, projectTitle: p.title})));
                combined = [...mTasks, ...mActions];
            } else {
                const aTasks = window.state.tasks.filter(t => t.date === window.state.selectedDate);
                const aActions = window.state.projects.flatMap(p => p.actions.filter(a => a.date === window.state.selectedDate).map(a => ({...a, isProjectAction: true, projectId: p.id, projectTitle: p.title})));
                combined = [...aTasks, ...aActions];
            }
            return combined;
        }

        function renderAgendaList() {
            const items = getAgendaData();
            if (items.length === 0) {
                return `<p class="text-xs lg:text-sm text-gray-500 italic border border-dashed p-4 rounded-xl text-center">${window.state.searchQuery ? 'No tasks found.' : 'No tasks or actions scheduled.'}</p>`;
            }

            return items.map((item) => {
                const isDone = item.done || item.isCompleted;
                const projCat = item.isProjectAction ? window.state.projects.find(p=>p.id === item.projectId)?.category : null;
                const catColorStr = (window.state.categories.find(c => c.name === (projCat || item.category)) || {}).color || 'bg-gray-300';
                
                return `
                <div class="p-3 lg:p-4 rounded-xl lg:rounded-2xl border flex items-start gap-3 lg:gap-4 transition-all relative overflow-hidden ${isDone ? 'bg-gray-50 border-gray-100 opacity-60' : 'bg-white shadow-sm'}">
                    <div class="absolute left-0 top-0 bottom-0 w-1 ${catColorStr}"></div>
                    <button onclick="${item.isProjectAction ? `window.toggleProjectAction(${item.projectId}, ${item.id})` : `window.toggleTask(${item.id})`}" class="flex-shrink-0 text-gray-400 hover:${window.state.theme.mainText} mt-0.5 ml-1 lg:ml-2">
                        <i data-lucide="${isDone ? 'check-circle-2' : 'circle'}" class="w-5 h-5 lg:w-6 lg:h-6 ${isDone ? window.state.theme.mainText : ''}"></i>
                    </button>
                    <div class="flex-1 overflow-hidden">
                        <h4 class="font-bold text-sm lg:text-base truncate ${isDone ? 'line-through text-gray-500' : 'text-gray-800'}">${item.title || item.text}</h4>
                        ${item.isProjectAction 
                            ? `<p class="text-[10px] lg:text-xs text-gray-500 font-medium mt-1 flex items-center gap-1 truncate"><i data-lucide="briefcase" class="w-3 h-3 flex-shrink-0"></i> Project: ${item.projectTitle}</p>`
                            : `<div class="text-[10px] lg:text-xs text-gray-500 mt-1 flex gap-3 truncate">
                                ${item.time ? `<span class="flex items-center gap-1 flex-shrink-0"><i data-lucide="clock" class="w-3 h-3"></i> ${item.time}</span>` : ''}
                                ${item.category ? `<span class="flex items-center gap-1 truncate"><i data-lucide="tag" class="w-3 h-3 flex-shrink-0"></i> ${item.category}</span>` : ''}
                               </div>`
                        }
                    </div>
                </div>`;
            }).join('');
        }

        function viewDashboard() {
            let sumComp = 0, sumToDo = 0;
            window.state.tasks.forEach(t => { const d = new Date(t.date); if (d.getMonth() === window.state.calMonth && d.getFullYear() === window.state.calYear) { t.done ? sumComp++ : sumToDo++; }});
            window.state.projects.forEach(p => { p.actions.forEach(a => { const d = new Date(a.date); if (d.getMonth() === window.state.calMonth && d.getFullYear() === window.state.calYear) { a.isCompleted ? sumComp++ : sumToDo++; }});});
            
            const sumActiveProjects = window.state.projects.filter(p => {
                const start = new Date(p.startDate), end = p.endDate ? new Date(p.endDate) : new Date(2099, 11, 31);
                const filterStart = new Date(window.state.calYear, window.state.calMonth, 1), filterEnd = new Date(window.state.calYear, window.state.calMonth + 1, 0);
                return start <= filterEnd && end >= filterStart;
            }).length;

            const optsHTML = monthOptions.map(opt => `<option value="${opt.m}-${opt.y}" ${opt.m === window.state.calMonth && opt.y === window.state.calYear ? 'selected' : ''}>${opt.label}</option>`).join('');

            return `
            <div class="grid grid-cols-1 xl:grid-cols-12 gap-6 lg:gap-8">
                <section class="xl:col-span-7">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg lg:text-xl font-bold">Task Summary</h2>
                        <div class="relative">
                            <select onchange="window.changeSummaryMonth(this.value)" class="appearance-none bg-white border border-gray-200 text-gray-700 py-2 pl-3 pr-8 rounded-xl focus:outline-none focus:ring-1 focus:ring-gray-300 text-xs lg:text-sm font-medium shadow-sm cursor-pointer">${optsHTML}</select>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-gray-500 absolute right-2 top-1/2 transform -translate-y-1/2 pointer-events-none"></i>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 lg:gap-4">
                        <div class="bg-white p-4 lg:p-5 rounded-2xl lg:rounded-3xl shadow-sm border border-gray-100 flex flex-col justify-center">
                            <span class="text-2xl lg:text-3xl font-bold mb-1">${sumComp}</span>
                            <span class="text-xs lg:text-sm font-medium text-gray-600">Completed</span>
                            <span class="text-[10px] lg:text-xs text-gray-400 mt-1">In ${MONTH_NAMES[window.state.calMonth]}</span>
                        </div>
                        <div class="bg-white p-4 lg:p-5 rounded-2xl lg:rounded-3xl shadow-sm border border-gray-100 flex flex-col justify-center">
                            <span class="text-2xl lg:text-3xl font-bold mb-1">${sumToDo}</span>
                            <span class="text-xs lg:text-sm font-medium text-gray-600">To Do</span>
                            <span class="text-[10px] lg:text-xs text-gray-400 mt-1">In ${MONTH_NAMES[window.state.calMonth]}</span>
                        </div>
                        <div class="bg-white p-4 lg:p-5 rounded-2xl lg:rounded-3xl shadow-sm border border-gray-100 flex flex-col justify-center col-span-2 sm:col-span-1">
                            <span class="text-2xl lg:text-3xl font-bold mb-1">${sumActiveProjects}</span>
                            <span class="text-xs lg:text-sm font-medium text-gray-600">Projects</span>
                            <span class="text-[10px] lg:text-xs text-gray-400 mt-1">Active in ${MONTH_NAMES[window.state.calMonth]}</span>
                        </div>
                    </div>
                </section>
                <section class="xl:col-span-5">
                    <h2 class="text-lg lg:text-xl font-bold mb-4">${window.state.searchQuery ? 'Search Results' : `Tasks for ${window.state.selectedDate}`}</h2>
                    <div class="space-y-3 lg:space-y-4" id="agenda-list-container">
                        ${renderAgendaList()}
                    </div>
                </section>
            </div>`;
        }

        function viewMyTasks() {
            const daysInMonth = new Date(window.state.calYear, window.state.calMonth + 1, 0).getDate();
            const startDay = new Date(window.state.calYear, window.state.calMonth, 1).getDay();
            
            let calDaysHTML = '';
            for(let i = 0; i < startDay; i++) calDaysHTML += `<div class="min-h-[60px] lg:min-h-[100px] border border-gray-50 rounded-lg lg:rounded-xl bg-gray-50/50 p-1 lg:p-2"></div>`;
            
            for(let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${window.state.calYear}-${String(window.state.calMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isSelected = window.state.selectedDate === dateStr;
                const isToday = dateStr === TODAY;
                
                const dayTasks = window.state.tasks.filter(t => t.date === dateStr);
                const activeProjects = window.state.projects.filter(p => dateStr >= p.startDate && (!p.endDate || dateStr <= p.endDate));

                let projBlocks = activeProjects.map(p => {
                    const color = (window.state.categories.find(c => c.name === p.category) || {}).color || 'bg-gray-500';
                    return `<div class="${color} text-transparent sm:text-white text-[8px] sm:text-[10px] px-0.5 sm:px-1.5 py-0.5 sm:truncate font-medium shadow-sm mb-[1px] h-1.5 sm:h-auto"><span class="hidden sm:inline">${p.title}</span></div>`;
                }).join('');

                let taskDots = dayTasks.map(t => {
                    const color = (window.state.categories.find(c => c.name === t.category) || {}).color || 'bg-gray-500';
                    return `<div class="flex items-center gap-1 overflow-hidden"><div class="w-1 lg:w-1.5 h-1 lg:h-1.5 rounded-full flex-shrink-0 ${color}"></div><span class="text-[8px] lg:text-[10px] font-medium truncate hidden sm:inline ${t.done ? 'line-through text-gray-400' : 'text-gray-700'}">${t.title}</span></div>`;
                }).join('');

                calDaysHTML += `
                <div onclick="window.selectDate('${dateStr}')" class="min-h-[60px] lg:min-h-[110px] border rounded-lg lg:rounded-xl relative transition cursor-pointer flex flex-col overflow-hidden ${isSelected ? `${window.state.theme.mainBorder} shadow-md ${window.state.theme.lightBg}` : 'border-gray-200 bg-white hover:border-gray-300'}">
                    <div class="w-full flex flex-col mb-0.5 lg:mb-1">${projBlocks}</div>
                    <div class="px-1 lg:px-2 pb-1 lg:pb-2 flex-1 flex flex-col">
                        <div class="flex justify-between items-center mb-0.5 lg:mb-1">
                            <span class="text-[10px] lg:text-sm font-bold w-5 h-5 lg:w-6 lg:h-6 flex items-center justify-center rounded-full ${isToday ? 'bg-orange-500 text-white' : (isSelected ? `${window.state.theme.mainBg} text-white` : 'text-gray-600')}">${day}</span>
                        </div>
                        <div class="flex-1 overflow-hidden space-y-0.5 lg:space-y-1 mt-0.5 lg:mt-1">${taskDots}</div>
                    </div>
                </div>`;
            }

            return `
            <div class="flex flex-col gap-6 lg:gap-8 h-full">
                <!-- Calendar -->
                <div class="bg-white p-4 lg:p-6 rounded-2xl lg:rounded-3xl shadow-sm border border-gray-100 overflow-x-auto">
                    <div class="flex justify-between items-center mb-4 lg:mb-6 min-w-[300px]">
                        <h2 class="text-xl lg:text-2xl font-bold">${MONTH_NAMES[window.state.calMonth]} ${window.state.calYear}</h2>
                        <div class="flex gap-2">
                            <button onclick="window.changeMonth(-1)" class="p-1.5 lg:p-2 border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-50" ${window.state.calYear === 2026 && window.state.calMonth === 5 ? 'disabled' : ''}><i data-lucide="chevron-left" class="w-4 h-4 lg:w-5 lg:h-5 text-gray-600"></i></button>
                            <button onclick="window.changeMonth(1)" class="p-1.5 lg:p-2 border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-50" ${window.state.calYear === 2030 && window.state.calMonth === 11 ? 'disabled' : ''}><i data-lucide="chevron-right" class="w-4 h-4 lg:w-5 lg:h-5 text-gray-600"></i></button>
                        </div>
                    </div>
                    <div class="grid grid-cols-7 gap-1 lg:gap-2 mb-1 lg:mb-2 min-w-[300px]">

        function viewProjects() {

        // ==========================================
        // 7. EVENT HANDLERS
        // ==========================================
        window.setActiveTab = (tabId) => { window.state.activeTab = tabId; renderApp(); };
        window.updateUserName = (val) => { window.state.userName = val; window.saveToStorage(); renderApp(); };
        window.changeTheme = (themeId) => { window.state.theme = THEMES.find(t => t.id === themeId); window.saveToStorage(); renderApp(); };
        window.handleSearch = (val) => { window.state.searchQuery = val; refreshTab(); };
        window.changeSummaryMonth = (val) => { const [m, y] = val.split('-'); window.state.calMonth = parseInt(m); window.state.calYear = parseInt(y); refreshTab(); };
        window.changeMonth = (offset) => {
            let newM = window.state.calMonth + offset; let newY = window.state.calYear;
            if (newM > 11) { newM = 0; newY++; } else if (newM < 0) { newM = 11; newY--; }
            if (newY < 2026 || (newY === 2026 && newM < 5) || newY > 2030) return;
            window.state.calMonth = newM; window.state.calYear = newY;
            refreshTab();
        };
        window.selectDate = (dateStr) => { window.state.selectedDate = dateStr; refreshTab(); };

        window.toggleTask = (id) => {
            window.state.tasks = window.state.tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
            window.saveToStorage(); refreshTab();
        };
        window.toggleProjectAction = (projectId, actionId) => {
            window.state.projects = window.state.projects.map(p => {
                if (p.id === projectId) {
                    const updated = p.actions.map(a => a.id === actionId ? { ...a, isCompleted: !a.isCompleted } : a);
                    const comp = updated.filter(a => a.isCompleted).length;
                    return { ...p, actions: updated, progress: Math.round((comp / updated.length) * 100) };
                }
                return p;
            });
            window.saveToStorage(); refreshTab();
        };
        window.deleteProjectAction = (projectId, actionId) => {
            window.state.projects = window.state.projects.map(p => {
                if (p.id === projectId) {
                    const updated = p.actions.filter(a => a.id !== actionId);
                    const comp = updated.filter(a => a.isCompleted).length;
                    return { ...p, actions: updated, progress: updated.length === 0 ? 0 : Math.round((comp / updated.length) * 100) };
                }
                return p;
            });
            window.saveToStorage(); refreshTab();
        };

        window.setEditingAction = (pId, aId, text, date) => { window.state.editingAction = { projectId: pId, actionId: aId, text, date }; refreshTab(); };
        window.cancelInlineEdit = () => { window.state.editingAction = null; refreshTab(); };
        window.saveInlineEditAction = () => {
            const txt = document.getElementById('edit-act-txt').value, dt = document.getElementById('edit-act-date').value;
            if (!txt) return;
            window.state.projects = window.state.projects.map(p => {
                if (p.id === window.state.editingAction.projectId) {
                    const updated = p.actions.map(a => a.id === window.state.editingAction.actionId ? { ...a, text: txt, date: dt } : a);
                    return { ...p, actions: updated };
                }
                return p;
            });
            window.state.editingAction = null; window.saveToStorage(); refreshTab();
        };

        window.openNewInlineAction = (pId) => { window.state.newInlineAction = { projectId: pId, text: '', date: TODAY }; refreshTab(); };
        window.cancelNewInlineAction = () => { window.state.newInlineAction = { projectId: null, text: '', date: TODAY }; refreshTab(); };
        window.addInlineAction = (pId) => {
            const txt = document.getElementById('new-act-txt').value, dt = document.getElementById('new-act-date').value;
            if (!txt) return;
            window.state.projects = window.state.projects.map(p => {
                if (p.id === pId) {
                    const updated = [...p.actions, { id: Date.now(), text: txt, date: dt, isCompleted: false }];
                    const comp = updated.filter(a => a.isCompleted).length;
                    return { ...p, actions: updated, progress: Math.round((comp / updated.length) * 100) };
                }
                return p;
            });
            window.state.newInlineAction = { projectId: null, text: '', date: TODAY }; window.saveToStorage(); refreshTab();
        };

        window.setNewCategoryColor = (color) => { window.state.newCategoryColor = color; renderModals(); };
        window.addNewCategory = () => {
            const input = document.getElementById('new-cat-input').value;
            if (input.trim() && !window.state.categories.find(c => c.name === input.trim())) {
                window.state.categories.push({ name: input.trim(), color: window.state.newCategoryColor });
                window.state.projectForm.category = input.trim();
                window.saveToStorage(); renderModals();
            }
        };

        // Task Modals
        window.openTaskModal = () => { window.state.isTaskModalOpen = true; renderModals(); };
        window.closeTaskModal = () => { window.state.isTaskModalOpen = false; renderModals(); };
        window.updateTaskFormProj = (val) => { window.state.taskForm.projectId = val; renderModals(); };
        window.toggleTaskFormAllDay = (checked) => { window.state.taskForm.isAllDay = checked; if(checked) window.state.taskForm.time = ''; renderModals(); };
        window.saveTask = () => {
            const title = document.getElementById('tf-title').value;
            if (!title) return;
            const date = document.getElementById('tf-date').value, endDate = document.getElementById('tf-end').value;
            const isAllDay = document.getElementById('tf-allday').checked, time = isAllDay ? '' : (document.getElementById('tf-time') ? document.getElementById('tf-time').value : '');
            const projId = document.getElementById('tf-proj').value, cat = projId ? '' : document.getElementById('tf-cat').value;

            if (projId) {
                window.state.projects = window.state.projects.map(p => {
                    if (p.id === parseInt(projId)) {
                        const updated = [...p.actions, { id: Date.now(), text: title, date: date, isCompleted: false }];
                        const comp = updated.filter(a => a.isCompleted).length;
                        return { ...p, actions: updated, progress: Math.round((comp / updated.length) * 100) };
                    }
                    return p;
                });
            } else window.state.tasks.push({ id: Date.now(), title, date, endDate, time, isAllDay, details: '', category: cat, done: false });

            window.state.taskForm = { title: '', date: TODAY, endDate: '', time: '', isAllDay: false, details: '', category: '', projectId: '' };
            window.state.isTaskModalOpen = false; window.saveToStorage(); renderModals(); refreshTab();
        };

        // Project Modals
        window.openNewProject = () => {
            window.state.projectForm = { id: null, title: '', startDate: TODAY, endDate: '', category: '', actions: [{ id: Date.now(), text: '', date: TODAY, isCompleted: false }] };
            window.state.isEditingProject = false; window.state.isProjectModalOpen = true; renderModals();
        };
        window.openEditProject = (id) => {
            window.state.projectForm = JSON.parse(JSON.stringify(window.state.projects.find(p => p.id === id)));
            window.state.isEditingProject = true; window.state.isProjectModalOpen = true; renderModals();
        };
        window.closeProjectModal = () => { window.state.isProjectModalOpen = false; window.state.isEditingProject = false; renderModals(); };
        window.syncProjectFormDOM = () => {
            window.state.projectForm.title = document.getElementById('pf-title').value;
            window.state.projectForm.startDate = document.getElementById('pf-start').value;
            window.state.projectForm.endDate = document.getElementById('pf-end').value;
            window.state.projectForm.category = document.getElementById('pf-cat').value;
            window.state.newCategoryInput = document.getElementById('new-cat-input').value;
            window.state.projectForm.actions.forEach(act => {
                const txtEl = document.getElementById(`pf-act-txt-${act.id}`), dateEl = document.getElementById(`pf-act-date-${act.id}`);
                if (txtEl) act.text = txtEl.value; if (dateEl) act.date = dateEl.value;
            });
        };
        window.addProjectFormAction = () => { window.syncProjectFormDOM(); window.state.projectForm.actions.push({ id: Date.now(), text: '', date: TODAY, isCompleted: false }); renderModals(); };
        window.removeProjectFormAction = (id) => { window.syncProjectFormDOM(); window.state.projectForm.actions = window.state.projectForm.actions.filter(a => a.id !== id); renderModals(); };
        window.saveProject = () => {
            window.syncProjectFormDOM();
            if (!window.state.projectForm.title) return;
            const total = window.state.projectForm.actions.length, comp = window.state.projectForm.actions.filter(a => a.isCompleted).length;
            const progress = total === 0 ? 0 : Math.round((comp / total) * 100);

            if (window.state.isEditingProject) window.state.projects = window.state.projects.map(p => p.id === window.state.projectForm.id ? { ...window.state.projectForm, progress } : p);
            else window.state.projects.push({ ...window.state.projectForm, id: Date.now(), progress });

            window.state.isProjectModalOpen = false; window.state.isEditingProject = false; window.saveToStorage(); renderModals(); refreshTab();
        };

        // ==========================================
        // 8. INITIALIZE APP
        // ==========================================
        loadFromStorage();
        renderApp();

    </script>
</body>
</html>
