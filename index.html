<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        /* Hide scrollbar for IE, Edge and Firefox */
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        /* Safe area for mobile devices */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
    </style>
</head>
<body class="bg-slate-50 font-sans overflow-hidden">
    
    <!-- Main App Container -->
    <div id="app" class="flex flex-col lg:flex-row h-screen"></div>
    
    <!-- Modal Container -->
    <div id="modal-root"></div>

    <script>
        // --- BASE DATA & CONSTANTS ---
        const TODAY = '2026-06-10';
        const TAILWIND_COLORS = [
            'bg-red-500', 'bg-orange-500', 'bg-amber-500', 
            'bg-green-500', 'bg-teal-500', 'bg-blue-500', 
            'bg-indigo-500', 'bg-purple-500', 'bg-pink-500'
        ];
        
        const MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

        const THEMES = [
            { id: 'teal', name: 'Teal (Default)', mainBg: 'bg-[#285c54]', mainText: 'text-[#285c54]', mainBorder: 'border-[#285c54]', hoverBg: 'hover:bg-[#1e4740]', lightBg: 'bg-[#eef7f5]', accentText: 'text-[#a7d3cb]' },
            { id: 'blue', name: 'Ocean Blue', mainBg: 'bg-blue-700', mainText: 'text-blue-700', mainBorder: 'border-blue-700', hoverBg: 'hover:bg-blue-800', lightBg: 'bg-blue-50', accentText: 'text-blue-200' },
            { id: 'purple', name: 'Royal Purple', mainBg: 'bg-purple-700', mainText: 'text-purple-700', mainBorder: 'border-purple-700', hoverBg: 'hover:bg-purple-800', lightBg: 'bg-purple-50', accentText: 'text-purple-200' }
        ];

        const TABS = [
            { id: 'Dashboard', name: 'Dashboard', icon: 'home' },
            { id: 'My Tasks', name: 'My Tasks', icon: 'calendar' },
            { id: 'Projects', name: 'Projects', icon: 'briefcase' },
            { id: 'Settings', name: 'Settings', icon: 'settings' }
        ];

        // --- STATE MANAGEMENT ---
        let state = {
            activeTab: 'Dashboard',
            userName: 'Tata',
            theme: THEMES[0],
            searchQuery: '',
            categories: [
                { name: 'Audit', color: 'bg-purple-500' },
                { name: 'Content', color: 'bg-orange-500' }
            ],
            tasks: [
                { id: 1, title: 'Review Marketing Copy', category: 'Content', done: true, date: TODAY, time: '10:00', isAllDay: false, details: 'Review all copy.' }
            ],
            projects: [
                {
                    id: 1,
                    title: 'United Tractors',
                    startDate: '2026-06-06',
                    endDate: '2026-08-06',
                    category: 'Audit',
                    progress: 33,
                    actions: [
                        { id: 101, text: 'Compile asset inventory', date: '2026-06-09', isCompleted: true },
                        { id: 102, text: 'Review visual identity', date: TODAY, isCompleted: false },
                        { id: 103, text: 'Draft presentation', date: '2026-06-15', isCompleted: false }
                    ]
                }
            ],
            calMonth: 5, // June
            calYear: 2026,
            selectedDate: TODAY,
            
            // Modals
            isTaskModalOpen: false,
            isProjectModalOpen: false,
            isEditingProject: false,
            
            // Forms
            taskForm: { title: '', date: TODAY, endDate: '', time: '', isAllDay: false, details: '', category: '', projectId: '' },
            projectForm: { id: null, title: '', startDate: TODAY, endDate: '', category: '', actions: [] },
            newCategoryInput: '',
            newCategoryColor: TAILWIND_COLORS[0],
            
            // Inline Editing Actions
            editingAction: null, // { projectId, actionId, text, date }
            newInlineAction: { projectId: null, text: '', date: TODAY }
        };

        // --- UTILITIES ---
        const getDaysInMonth = (m, y) => new Date(y, m + 1, 0).getDate();
        const getFirstDayOfMonth = (m, y) => new Date(y, m, 1).getDay();
        
        let monthOptions = [];
        for(let y = 2026; y <= 2030; y++) {
            let startM = (y === 2026) ? 5 : 0;
            for(let m = startM; m < 12; m++) {
                monthOptions.push({ label: `${MONTH_NAMES[m]} ${y}`, m, y });
            }
        }

        // --- MAIN RENDER FUNCTIONS ---
        function renderApp() {
            const app = document.getElementById('app');
            app.innerHTML = `
                ${renderMobileHeader()}
                ${renderDesktopSidebar()}
                ${renderMainContent()}
                ${renderMobileNav()}
            `;
            lucide.createIcons();
        }

        function renderModals() {
            const modalRoot = document.getElementById('modal-root');
            let html = '';
            if (state.isTaskModalOpen) html += renderTaskModal();
            if (state.isProjectModalOpen) html += renderProjectModal();
            modalRoot.innerHTML = html;
            lucide.createIcons();
        }

        function refreshTab() {
            const content = document.getElementById('tab-content');
            if (content) {
                if (state.activeTab === 'Dashboard') content.innerHTML = viewDashboard();
                else if (state.activeTab === 'My Tasks') content.innerHTML = viewMyTasks();
                else if (state.activeTab === 'Projects') content.innerHTML = viewProjects();
                else if (state.activeTab === 'Settings') content.innerHTML = viewSettings();
                lucide.createIcons();
            }
        }

        // --- LAYOUT COMPONENTS ---
        function renderMobileHeader() {
            return `
            <header class="lg:hidden ${state.theme.mainBg} text-white p-4 rounded-b-3xl flex justify-between items-center z-20 shadow-md flex-shrink-0">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full border-2 border-white/20 bg-black/20 flex items-center justify-center">
                        <span class="font-bold text-lg uppercase user-initial-display">${state.userName.charAt(0)}</span>
                    </div>
                    <div>
                        <h1 class="font-bold text-lg leading-tight tracking-wide flex items-center gap-1">
                            <i data-lucide="check-square" class="w-4 h-4 opacity-80"></i> Tracker
                        </h1>
                        <p class="text-[10px] ${state.theme.accentText}">Hello, <span class="user-name-display">${state.userName}</span></p>
                    </div>
                </div>
            </header>`;
        }

        function renderDesktopSidebar() {
            const navItems = TABS.map(t => `
                <button onclick="window.setActiveTab('${t.id}')" class="w-full flex items-center gap-4 px-4 py-3 rounded-2xl transition-all duration-200 ${state.activeTab === t.id ? 'bg-white/10 font-medium shadow-sm' : 'text-white/70 hover:bg-white/5 hover:text-white'}">
                    <i data-lucide="${t.icon}" class="w-5 h-5"></i>
                    ${t.name}
                </button>
            `).join('');

            return `
            <aside class="hidden lg:flex w-64 ${state.theme.mainBg} text-white flex-shrink-0 flex-col rounded-r-3xl z-10 h-full transition-colors duration-300">
                <div class="p-8 pb-4">
                    <div class="flex items-center gap-2 mb-10 font-bold text-xl tracking-wide">
                        <i data-lucide="check-square" class="w-6 h-6 ${state.theme.accentText}"></i> Tracker
                    </div>
                    <div class="flex flex-col items-center mb-6">
                        <div class="w-20 h-20 rounded-full border-4 border-white/20 bg-black/20 flex items-center justify-center mb-4 shadow-lg">
                            <span class="text-3xl font-bold uppercase user-initial-display">${state.userName.charAt(0)}</span>
                        </div>
                        <h2 class="font-semibold text-lg user-name-display">${state.userName}</h2>
                    </div>
                </div>
                <nav class="flex-1 px-4 space-y-2" id="desktop-nav">${navItems}</nav>
            </aside>`;
        }

        function renderMobileNav() {
            const navItems = TABS.map(t => {
                const isActive = state.activeTab === t.id;
                return `
                <button onclick="window.setActiveTab('${t.id}')" class="flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors ${isActive ? state.theme.mainText : 'text-gray-400'}">
                    <i data-lucide="${t.icon}" class="w-5 h-5 ${isActive ? 'fill-current opacity-20' : ''}"></i>
                    <span class="text-[9px] font-bold">${t.name}</span>
                </button>`;
            }).join('');

            return `
            <div class="lg:hidden fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 z-40 flex justify-around items-center h-16 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]" id="mobile-nav">
                ${navItems}
            </div>`;
        }

        function renderMainContent() {
            const title = state.activeTab === 'Dashboard' ? `Hello, <span class="user-name-display">${state.userName}</span>` : TABS.find(t=>t.id === state.activeTab).name;
            
            return `
            <main class="flex-1 p-4 lg:p-10 pb-28 lg:pb-10 overflow-y-auto scrollbar-hide flex flex-col relative">
                <!-- Desktop Header -->
                <header class="hidden lg:flex flex-col md:flex-row md:items-center justify-between mb-10 gap-4 flex-shrink-0" id="main-header-desktop">
                    <div>
                        <h1 class="text-3xl font-bold text-gray-800 tracking-tight" id="desktop-title">${title}</h1>
                        <p class="text-gray-500 mt-1">Wednesday, 10 Jun 2026</p>
                    </div>
                    <div class="flex items-center gap-4 w-full md:w-auto">
                        <div class="relative w-full md:w-64">
                            <i data-lucide="search" class="w-5 h-5 absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="text" oninput="window.handleSearch(this.value)" value="${state.searchQuery}" placeholder="Search tasks..." class="pl-10 pr-4 py-2.5 bg-white rounded-full text-sm border-none shadow-sm focus:outline-none focus:ring-2 focus:ring-gray-200 w-full" />
                        </div>
                    </div>
                </header>

                <!-- Mobile Header Area -->
                <div class="lg:hidden mb-4 space-y-4" id="main-header-mobile">
                    <div class="relative">
                        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="text" oninput="window.handleSearch(this.value)" value="${state.searchQuery}" placeholder="Search tasks..." class="pl-9 pr-4 py-2 bg-white rounded-full text-xs border border-gray-100 shadow-sm focus:outline-none w-full" />
                    </div>
                    <div class="flex justify-between items-end">
                        <h1 class="text-xl font-bold text-gray-800 tracking-tight" id="mobile-title">${state.activeTab === 'Dashboard' ? 'Overview' : title}</h1>
                        <p class="text-xs text-gray-500">10 Jun '26</p>
                    </div>
                </div>

                <!-- Tab Content -->
                <div class="flex-1 max-w-6xl w-full mx-auto" id="tab-content">
                    ${state.activeTab === 'Dashboard' ? viewDashboard() : ''}
                    ${state.activeTab === 'My Tasks' ? viewMyTasks() : ''}
                    ${state.activeTab === 'Projects' ? viewProjects() : ''}
                    ${state.activeTab === 'Settings' ? viewSettings() : ''}
                </div>

                <!-- FAB -->
                <button onclick="window.openTaskModal()" class="fixed bottom-20 right-4 lg:bottom-10 lg:right-10 w-14 h-14 lg:w-16 lg:h-16 bg-gray-900 text-white rounded-full flex items-center justify-center shadow-xl ${state.theme.hoverBg} hover:scale-105 transition-all z-30 group" title="Add New Task">
                    <i data-lucide="plus" class="w-6 h-6 lg:w-8 lg:h-8 group-hover:rotate-90 transition-transform duration-300"></i>
                </button>
            </main>`;
        }

        // --- VIEWS RENDERING FUNCTIONS ---

        function getAgendaData() {
            let combined = [];
            if (state.searchQuery.trim() !== '') {
                const q = state.searchQuery.toLowerCase();
                const mTasks = state.tasks.filter(t => t.title.toLowerCase().includes(q) || (t.details && t.details.toLowerCase().includes(q)));
                const mActions = state.projects.flatMap(p => p.actions.filter(a => a.text.toLowerCase().includes(q)).map(a => ({...a, isProjectAction: true, projectId: p.id, projectTitle: p.title})));
                combined = [...mTasks, ...mActions];
            } else {
                const aTasks = state.tasks.filter(t => t.date === state.selectedDate);
                const aActions = state.projects.flatMap(p => p.actions.filter(a => a.date === state.selectedDate).map(a => ({...a, isProjectAction: true, projectId: p.id, projectTitle: p.title})));
                combined = [...aTasks, ...aActions];
            }
            return combined;
        }

        function renderAgendaList(limit = false) {
            const agenda = getAgendaData();
            let items = limit ? agenda.filter(t => !(t.done || t.isCompleted)).slice(0, 5) : agenda;
            
            if (items.length === 0) {
                return `<p class="text-xs lg:text-sm text-gray-500 italic border border-dashed p-4 rounded-xl text-center">
                    ${state.searchQuery ? 'No tasks found matching your search.' : 'No tasks or actions scheduled.'}
                </p>`;
            }

            return items.map((item, idx) => {
                const isDone = item.done || item.isCompleted;
                const projCat = item.isProjectAction ? state.projects.find(p=>p.id === item.projectId)?.category : null;
                const catColorStr = (state.categories.find(c => c.name === (projCat || item.category)) || {}).color || 'bg-gray-300';
                
                return `
                <div class="p-3 lg:p-4 rounded-xl lg:rounded-2xl border flex items-start gap-3 lg:gap-4 transition-all relative overflow-hidden ${isDone ? 'bg-gray-50 border-gray-100 opacity-60' : 'bg-white shadow-sm'}">
                    <div class="absolute left-0 top-0 bottom-0 w-1 ${catColorStr}"></div>
                    <button onclick="${item.isProjectAction ? `window.toggleProjectAction(${item.projectId}, ${item.id})` : `window.toggleTask(${item.id})`}" class="flex-shrink-0 text-gray-400 hover:${state.theme.mainText} mt-0.5 ml-1 lg:ml-2">
                        <i data-lucide="${isDone ? 'check-circle-2' : 'circle'}" class="w-5 h-5 lg:w-6 lg:h-6 ${isDone ? state.theme.mainText : ''}"></i>
                    </button>
                    <div class="flex-1 overflow-hidden">
                        <h4 class="font-bold text-sm lg:text-base text-gray-800 truncate ${isDone ? 'line-through' : ''}">${item.title || item.text}</h4>
                        ${item.isProjectAction 
                            ? `<p class="text-[10px] lg:text-xs text-gray-500 font-medium mt-1 flex items-center gap-1 truncate"><i data-lucide="briefcase" class="w-3 h-3 flex-shrink-0"></i> Project: ${item.projectTitle}</p>`
                            : `<div class="text-[10px] lg:text-xs text-gray-500 mt-1 flex gap-3 truncate">
                                ${item.time ? `<span class="flex items-center gap-1 flex-shrink-0"><i data-lucide="clock" class="w-3 h-3"></i> ${item.time}</span>` : ''}
                                ${item.category ? `<span class="flex items-center gap-1 truncate"><i data-lucide="tag" class="w-3 h-3 flex-shrink-0"></i> ${item.category}</span>` : ''}
                               </div>`
                        }
                    </div>
                </div>`;
            }).join('');
        }

        function viewDashboard() {
            let sumCompleted = 0; let sumToDo = 0;
            state.tasks.forEach(t => {
                const d = new Date(t.date);
                if (d.getMonth() === state.calMonth && d.getFullYear() === state.calYear) { if (t.done) sumCompleted++; else sumToDo++; }
            });
            state.projects.forEach(p => {
                p.actions.forEach(a => {
                    const d = new Date(a.date);
                    if (d.getMonth() === state.calMonth && d.getFullYear() === state.calYear) { if (a.isCompleted) sumCompleted++; else sumToDo++; }
                });
            });
            const sumActiveProjects = state.projects.filter(p => {
                const start = new Date(p.startDate);
                const end = p.endDate ? new Date(p.endDate) : new Date(2099, 11, 31);
                const filterStart = new Date(state.calYear, state.calMonth, 1);
                const filterEnd = new Date(state.calYear, state.calMonth + 1, 0);
                return start <= filterEnd && end >= filterStart;
            }).length;

            const optsHTML = monthOptions.map(opt => `<option value="${opt.m}-${opt.y}" ${opt.m === state.calMonth && opt.y === state.calYear ? 'selected' : ''}>${opt.label}</option>`).join('');

            return `
            <div class="grid grid-cols-1 xl:grid-cols-12 gap-6 lg:gap-8">
                <section class="xl:col-span-7">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg lg:text-xl font-bold text-gray-800">Task Summary</h2>
                        <div class="relative">
                            <select onchange="window.changeSummaryMonth(this.value)" class="appearance-none bg-white border border-gray-200 text-gray-700 py-2 pl-3 pr-8 rounded-xl focus:outline-none focus:ring-1 focus:ring-gray-300 text-xs lg:text-sm font-medium shadow-sm cursor-pointer">${optsHTML}</select>
                            <i data-lucide="chevron-down" class="w-4 h-4 text-gray-500 absolute right-2 top-1/2 transform -translate-y-1/2 pointer-events-none"></i>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 lg:gap-4">
                        <div class="bg-white p-4 lg:p-5 rounded-2xl lg:rounded-3xl shadow-sm border border-gray-100 flex flex-col justify-center">
                            <span class="text-2xl lg:text-3xl font-bold text-gray-800 mb-1">${sumCompleted}</span>
                            <span class="text-xs lg:text-sm font-medium text-gray-600">Completed</span>
                            <span class="text-[10px] lg:text-xs text-gray-400 mt-1">In ${MONTH_NAMES[state.calMonth]}</span>
                        </div>
                        <div class="bg-white p-4 lg:p-5 rounded-2xl lg:rounded-3xl shadow-sm border border-gray-100 flex flex-col justify-center">
                            <span class="text-2xl lg:text-3xl font-bold text-gray-800 mb-1">${sumToDo}</span>
                            <span class="text-xs lg:text-sm font-medium text-gray-600">To Do</span>
                            <span class="text-[10px] lg:text-xs text-gray-400 mt-1">In ${MONTH_NAMES[state.calMonth]}</span>
                        </div>
                        <div class="bg-white p-4 lg:p-5 rounded-2xl lg:rounded-3xl shadow-sm border border-gray-100 flex flex-col justify-center col-span-2 sm:col-span-1">
                            <span class="text-2xl lg:text-3xl font-bold text-gray-800 mb-1">${sumActiveProjects}</span>
                            <span class="text-xs lg:text-sm font-medium text-gray-600">Projects</span>
                            <span class="text-[10px] lg:text-xs text-gray-400 mt-1">Active in ${MONTH_NAMES[state.calMonth]}</span>
                        </div>
                    </div>
                </section>
                <section class="xl:col-span-5">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg lg:text-xl font-bold text-gray-800">${state.searchQuery ? 'Search Results' : `Tasks for ${state.selectedDate}`}</h2>
                    </div>
                    <div class="space-y-3 lg:space-y-4" id="agenda-list-container">
                        ${renderAgendaList(true)}
                    </div>
                </section>
            </div>`;
        }

        function viewMyTasks() {
            const daysInMonth = getDaysInMonth(state.calMonth, state.calYear);
            const startDay = getFirstDayOfMonth(state.calMonth, state.calYear);
            
            let calDaysHTML = '';
            for(let i=0; i<startDay; i++) {
                calDaysHTML += `<div class="min-h-[60px] lg:min-h-[100px] border border-gray-50 rounded-lg lg:rounded-xl bg-gray-50/50 p-1 lg:p-2"></div>`;
            }
            
            for(let day=1; day<=daysInMonth; day++) {
                const dateStr = `${state.calYear}-${(state.calMonth + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                const isSelected = state.selectedDate === dateStr;
                const isToday = dateStr === TODAY;
                
                const dayTasks = state.tasks.filter(t => t.date === dateStr);
                const activeProjectsForDay = state.projects.filter(p => dateStr >= p.startDate && (!p.endDate || dateStr <= p.endDate));

                let projBlocks = activeProjectsForDay.map(p => {
                    const catColor = (state.categories.find(c => c.name === p.category) || {}).color || 'bg-gray-500';
                    return `<div class="${catColor} text-transparent sm:text-white text-[8px] sm:text-[10px] px-0.5 sm:px-1.5 py-0.5 sm:truncate font-medium shadow-sm mb-[1px] h-1.5 sm:h-auto"><span class="hidden sm:inline">${p.title}</span></div>`;
                }).join('');

                let taskDots = dayTasks.map(t => {
                    const catColor = (state.categories.find(c => c.name === t.category) || {}).color || 'bg-gray-500';
                    return `
                    <div class="flex items-center gap-1 overflow-hidden">
                        <div class="w-1 lg:w-1.5 h-1 lg:h-1.5 rounded-full flex-shrink-0 ${catColor}"></div>
                        <span class="text-[8px] lg:text-[10px] font-medium truncate hidden sm:inline ${t.done ? 'line-through text-gray-400' : 'text-gray-700'}">${t.title}</span>
                    </div>`;
                }).join('');

                const selClasses = isSelected ? `${state.theme.mainBorder} shadow-md ${state.theme.lightBg}` : 'border-gray-200 bg-white hover:border-gray-300';
                const circleClasses = isToday ? 'bg-orange-500 text-white' : (isSelected ? `${state.theme.mainBg} text-white` : 'text-gray-600');

                calDaysHTML += `
                <div onclick="window.selectDate('${dateStr}')" class="min-h-[60px] lg:min-h-[110px] border rounded-lg lg:rounded-xl relative transition cursor-pointer flex flex-col overflow-hidden ${selClasses}">
                    <div class="w-full flex flex-col mb-0.5 lg:mb-1">${projBlocks}</div>
                    <div class="px-1 lg:px-2 pb-1 lg:pb-2 flex-1 flex flex-col">
                        <div class="flex justify-between items-center mb-0.5 lg:mb-1">
                            <span class="text-[10px] lg:text-sm font-bold w-5 h-5 lg:w-6 lg:h-6 flex items-center justify-center rounded-full ${circleClasses}">${day}</span>
                        </div>
                        <div class="flex-1 overflow-hidden space-y-0.5 lg:space-y-1 mt-0.5 lg:mt-1">${taskDots}</div>
                    </div>
                </div>`;
            }

            return `
            <div class="flex flex-col gap-6 lg:gap-8 h-full">
                <!-- Calendar -->
                <div class="bg-white p-4 lg:p-6 rounded-2xl lg:rounded-3xl shadow-sm border border-gray-100 overflow-x-auto">
                    <div class="flex justify-between items-center mb-4 lg:mb-6 min-w-[300px]">
                        <h2 class="text-xl lg:text-2xl font-bold text-gray-800">${MONTH_NAMES[state.calMonth]} ${state.calYear}</h2>
                        <div class="flex gap-2">
                            <button onclick="window.changeMonth(-1)" class="p-1.5 lg:p-2 border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-50" ${state.calYear === 2026 && state.calMonth === 5 ? 'disabled' : ''}><i data-lucide="chevron-left" class="w-4 h-4 lg:w-5 lg:h-5 text-gray-600"></i></button>
                            <button onclick="window.changeMonth(1)" class="p-1.5 lg:p-2 border border-gray-200 rounded-lg hover:bg-gray-50 disabled:opacity-50" ${state.calYear === 2030 && state.calMonth === 11 ? 'disabled' : ''}><i data-lucide="chevron-right" class="w-4 h-4 lg:w-5 lg:h-5 text-gray-600"></i></button>
                        </div>
                    </div>
                    <div class="grid grid-cols-7 gap-1 lg:gap-2 mb-1 lg:mb-2 min-w-[300px]">
                        ${['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => `<div class="text-center text-[10px] lg:text-sm font-semibold text-gray-400 py-1 lg:py-2">${window.innerWidth < 640 ? d.charAt(0) : d}</div>`).join('')}
                    </div>

        function viewProjects() {
            const projectsHTML = state.projects.map(project => {
                const catColor = (state.categories.find(c => c.name === project.category) || {}).color || 'bg-gray-500';
                
                let sortedActions = [...project.actions].sort((a, b) => {
                    if (a.isCompleted && !b.isCompleted) return 1;
                    if (!a.isCompleted && b.isCompleted) return -1;
                    if (!a.isCompleted && !b.isCompleted) return a.date.localeCompare(b.date);
                    return 0;
                });

                const actionsHTML = sortedActions.map(action => {
                    const isEditing = state.editingAction?.actionId === action.id;
                    const isDeadlineToday = action.date === TODAY && !action.isCompleted;

                    if (isEditing) {
                        return `
                        <div class="flex items-center gap-2 lg:gap-3 p-2 rounded-xl transition border bg-white border-gray-100 shadow-sm flex-wrap sm:flex-nowrap">

                            </div>
                        </div>`;
                    }

                    return `
                    <div class="flex items-center gap-2 lg:gap-3 p-2 rounded-xl transition border ${action.isCompleted ? 'bg-gray-50 border-transparent opacity-60' : 'bg-white border-gray-100 shadow-sm flex-wrap sm:flex-nowrap'}">
                        <button onclick="window.toggleProjectAction(${project.id}, ${action.id})" class="flex-shrink-0">
                            <i data-lucide="${action.isCompleted ? 'check-circle-2' : 'circle'}" class="w-4 h-4 lg:w-5 lg:h-5 ${action.isCompleted ? state.theme.mainText : 'text-gray-300 hover:'+state.theme.mainText}"></i>
                        </button>
                        <span class="text-xs lg:text-sm flex-1 break-words ${action.isCompleted ? 'line-through text-gray-400' : 'text-gray-800 font-medium'}">${action.text}</span>
                        <span class="text-[10px] lg:text-xs px-2 py-1 rounded font-bold whitespace-nowrap ${isDeadlineToday ? 'bg-red-100 text-red-600 border border-red-200' : 'bg-gray-100 text-gray-600 border border-transparent'}">${action.date}</span>
                        <div class="flex gap-1 ml-auto sm:ml-2">
                            <button onclick="window.setEditingAction(${project.id}, ${action.id}, '${action.text.replace(/'/g, "\\'")}', '${action.date}')" class="p-1.5 text-gray-400 hover:${state.theme.mainText} hover:${state.theme.lightBg} rounded-lg transition"><i data-lucide="edit-2" class="w-3 h-3 lg:w-4 lg:h-4"></i></button>
                            <button onclick="window.deleteProjectAction(${project.id}, ${action.id})" class="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition"><i data-lucide="trash-2" class="w-3 h-3 lg:w-4 lg:h-4"></i></button>
                        </div>
                    </div>`;
                }).join('');

                const newActionHTML = state.newInlineAction.projectId === project.id ? `
                    <div class="flex flex-col sm:flex-row sm:items-center gap-2 mt-4 p-2 lg:p-3 ${state.theme.lightBg} rounded-xl border border-gray-200">
                        <div class="flex-1 flex flex-col sm:flex-row gap-2">
                            <input type="text" id="new-act-txt" placeholder="Action detail..." value="${state.newInlineAction.text}" class="flex-1 border border-gray-200 rounded-lg px-2 lg:px-3 py-1.5 lg:py-2 text-xs lg:text-sm outline-none" autofocus/>
                            <input type="date" id="new-act-date" value="${state.newInlineAction.date}" class="border border-gray-200 rounded-lg px-2 lg:px-3 py-1.5 lg:py-2 text-xs lg:text-sm outline-none"/>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="window.addInlineAction(${project.id})" class="${state.theme.mainBg} text-white px-3 py-1.5 lg:py-2 rounded-lg text-xs lg:text-sm font-bold flex-1 sm:flex-none justify-center flex">Add</button>
                            <button onclick="window.cancelNewInlineAction()" class="bg-gray-300 text-gray-700 px-3 py-1.5 lg:py-2 rounded-lg text-xs lg:text-sm font-bold flex-1 sm:flex-none justify-center flex">Cancel</button>
                        </div>
                    </div>
                ` : `

                            </p>
                        </div>
                        <div class="text-left sm:text-right">
                            <span class="text-xl lg:text-2xl font-bold ${state.theme.mainText}">${project.progress}%</span>
                            <p class="text-[10px] lg:text-xs text-gray-400">Completed</p>

                    <div class="space-y-2 lg:space-y-3 mt-4 border-t border-gray-50 pt-4">

        // --- EVENT HANDLERS ---
        window.setActiveTab = (tabId) => {
            state.activeTab = tabId;
            renderApp();
        };

        window.updateUserName = (val) => {
            state.userName = val;
            document.querySelectorAll('.user-name-display').forEach(el => el.innerText = val);
            document.querySelectorAll('.user-initial-display').forEach(el => el.innerText = val.charAt(0).toUpperCase());
        };

        window.changeTheme = (themeId) => {
            state.theme = THEMES.find(t => t.id === themeId);
            renderApp();
        };

        window.handleSearch = (val) => {
            state.searchQuery = val;
            const container = document.getElementById('agenda-list-container');
            if (container) {
                container.innerHTML = renderAgendaList(state.activeTab === 'Dashboard');
                lucide.createIcons();
            }
        };

        window.changeSummaryMonth = (val) => {
            const [m, y] = val.split('-');
            state.calMonth = parseInt(m);
            state.calYear = parseInt(y);
            refreshTab();
        };

        window.changeMonth = (offset) => {
            let newM = state.calMonth + offset; let newY = state.calYear;
            if (newM > 11) { newM = 0; newY++; } else if (newM < 0) { newM = 11; newY--; }
            if (newY < 2026 || (newY === 2026 && newM < 5)) return;
            if (newY > 2030) return;
            state.calMonth = newM; state.calYear = newY;
            refreshTab();
        };

        window.selectDate = (dateStr) => {
            state.selectedDate = dateStr;
            refreshTab();
        };

        // Toggle Task & Projects
        window.toggleTask = (id) => {
            state.tasks = state.tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
            refreshTab();
        };

        window.toggleProjectAction = (projectId, actionId) => {
            state.projects = state.projects.map(p => {
                if (p.id === projectId) {
                    const updatedActions = p.actions.map(a => a.id === actionId ? { ...a, isCompleted: !a.isCompleted } : a);
                    const total = updatedActions.length;
                    const completed = updatedActions.filter(a => a.isCompleted).length;
                    return { ...p, actions: updatedActions, progress: Math.round((completed / total) * 100) };
                }
                return p;
            });
            refreshTab();
        };

        window.deleteProjectAction = (projectId, actionId) => {
            state.projects = state.projects.map(p => {
                if (p.id === projectId) {
                    const updatedActions = p.actions.filter(a => a.id !== actionId);
                    const total = updatedActions.length;
                    const completed = updatedActions.filter(a => a.isCompleted).length;
                    return { ...p, actions: updatedActions, progress: total === 0 ? 0 : Math.round((completed / total) * 100) };
                }
                return p;
            });
            refreshTab();
        };

        // Inline Actions
        window.setEditingAction = (projectId, actionId, text, date) => {
            state.editingAction = { projectId, actionId, text, date };
            refreshTab();
        };
        
        window.cancelInlineEdit = () => {
            state.editingAction = null;
            refreshTab();
        };

        window.saveInlineEditAction = () => {
            const txt = document.getElementById('edit-act-txt').value;
            const dt = document.getElementById('edit-act-date').value;
            if (!txt) return;
            state.projects = state.projects.map(p => {
                if (p.id === state.editingAction.projectId) {
                    const updatedActions = p.actions.map(a => a.id === state.editingAction.actionId ? { ...a, text: txt, date: dt } : a);
                    return { ...p, actions: updatedActions };
                }
                return p;
            });
            state.editingAction = null;
            refreshTab();
        };

        window.openNewInlineAction = (projectId) => {
            state.newInlineAction = { projectId, text: '', date: TODAY };
            refreshTab();
        };

        window.cancelNewInlineAction = () => {
            state.newInlineAction = { projectId: null, text: '', date: TODAY };
            refreshTab();
        };

        window.addInlineAction = (projectId) => {
            const txt = document.getElementById('new-act-txt').value;
            const dt = document.getElementById('new-act-date').value;
            if (!txt) return;
            state.projects = state.projects.map(p => {
                if (p.id === projectId) {
                    const updatedActions = [...p.actions, { id: Date.now(), text: txt, date: dt, isCompleted: false }];
                    const total = updatedActions.length;
                    const completed = updatedActions.filter(a => a.isCompleted).length;
                    return { ...p, actions: updatedActions, progress: Math.round((completed / total) * 100) };
                }
                return p;
            });
            state.newInlineAction = { projectId: null, text: '', date: TODAY };
            refreshTab();
        };

        // Category Management
        window.setNewCategoryColor = (color) => {
            state.newCategoryColor = color;
            renderModals();
        };

        window.addNewCategory = () => {
            const input = document.getElementById('new-cat-input').value;
            if (input.trim() && !state.categories.find(c => c.name === input.trim())) {
                state.categories.push({ name: input.trim(), color: state.newCategoryColor });
                state.projectForm.category = input.trim();
                renderModals();
            }
        };

        // Task Modal Management
        window.openTaskModal = () => { state.isTaskModalOpen = true; renderModals(); };
        window.closeTaskModal = () => { state.isTaskModalOpen = false; renderModals(); };
        
        window.updateTaskFormProj = (val) => {
            state.taskForm.projectId = val;
            renderModals();
        };

        window.toggleTaskFormAllDay = (checked) => {
            state.taskForm.isAllDay = checked;
            if(checked) state.taskForm.time = '';
            renderModals();
        };

        window.saveTask = () => {
            const title = document.getElementById('tf-title').value;
            if (!title) return;

            const date = document.getElementById('tf-date').value;
            const endDate = document.getElementById('tf-end').value;
            const isAllDay = document.getElementById('tf-allday').checked;
            const time = isAllDay ? '' : (document.getElementById('tf-time') ? document.getElementById('tf-time').value : '');
            const projId = document.getElementById('tf-proj').value;
            const cat = projId ? '' : document.getElementById('tf-cat').value;

            if (projId) {
                state.projects = state.projects.map(p => {
                    if (p.id === parseInt(projId)) {
                        const newAct = { id: Date.now(), text: title, date: date, isCompleted: false };
                        const updated = [...p.actions, newAct];
                        const completed = updated.filter(a => a.isCompleted).length;
                        return { ...p, actions: updated, progress: Math.round((completed / updated.length) * 100) };
                    }
                    return p;
                });
            } else {
                state.tasks.push({ id: Date.now(), title, date, endDate, time, isAllDay, details: '', category: cat, done: false });
            }

            state.taskForm = { title: '', date: TODAY, endDate: '', time: '', isAllDay: false, details: '', category: '', projectId: '' };
            state.isTaskModalOpen = false;
            renderModals();
            refreshTab();
        };

        // Project Modal Management
        window.openNewProject = () => {
            state.projectForm = { id: null, title: '', startDate: TODAY, endDate: '', category: '', actions: [{ id: Date.now(), text: '', date: TODAY, isCompleted: false }] };
            state.isEditingProject = false;
            state.isProjectModalOpen = true;
            renderModals();
        };

        window.openEditProject = (id) => {
            const proj = state.projects.find(p => p.id === id);
            // Deep copy to prevent direct mutation
            state.projectForm = JSON.parse(JSON.stringify(proj));
            state.isEditingProject = true;
            state.isProjectModalOpen = true;
            renderModals();
        };

        window.closeProjectModal = () => {
            state.isProjectModalOpen = false;
            state.isEditingProject = false;
            renderModals();
        };

        window.syncProjectFormDOM = () => {
            // Get current values from DOM to state before re-rendering modal
            state.projectForm.title = document.getElementById('pf-title').value;
            state.projectForm.startDate = document.getElementById('pf-start').value;
            state.projectForm.endDate = document.getElementById('pf-end').value;
            state.projectForm.category = document.getElementById('pf-cat').value;
            state.newCategoryInput = document.getElementById('new-cat-input').value;
            
            state.projectForm.actions.forEach(act => {
                const txtEl = document.getElementById(`pf-act-txt-${act.id}`);
                const dateEl = document.getElementById(`pf-act-date-${act.id}`);
                if (txtEl) act.text = txtEl.value;
                if (dateEl) act.date = dateEl.value;
            });
        };

        window.addProjectFormAction = () => {
            syncProjectFormDOM();
            state.projectForm.actions.push({ id: Date.now(), text: '', date: TODAY, isCompleted: false });
            renderModals();
        };

        window.removeProjectFormAction = (id) => {
            syncProjectFormDOM();
            state.projectForm.actions = state.projectForm.actions.filter(a => a.id !== id);
            renderModals();
        };

        window.saveProject = () => {
            syncProjectFormDOM();
            if (!state.projectForm.title) return;

            const total = state.projectForm.actions.length;
            const comp = state.projectForm.actions.filter(a => a.isCompleted).length;
            const progress = total === 0 ? 0 : Math.round((comp / total) * 100);

            if (state.isEditingProject) {
                state.projects = state.projects.map(p => p.id === state.projectForm.id ? { ...state.projectForm, progress } : p);
            } else {
                state.projects.push({ ...state.projectForm, id: Date.now(), progress });
            }

            state.isProjectModalOpen = false;
            state.isEditingProject = false;
            renderModals();
            refreshTab();
        };

        // --- INITIALIZE APP ---
        renderApp();

    </script>
</body>
</html>
